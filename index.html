<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>Tour360 - Visualizador 360° VR V0</title>

  <!-- Importa Three.js (módulo ES6) -->
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://unpkg.com/three@0.150.1/examples/jsm/webxr/VRButton.js';

    let camera, scene, renderer;
    let controls;
    let sphereMono, sphereLeft, sphereRight;
    let texture360;

    init();
    animate();

    function init() {
      // 1) CENA E CÂMERA
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.01); // Coloca dentro da esfera

      // 2) RENDERER COM WebXR ATIVADO
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.xr.enabled = true; // Libera VR
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      // 3) CONTROLES (mouse/touch) PARA ROLAR A VIEW NO MODO NÃO-VR
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;

      // 4) GEOMETRIA DA ESFERA (inverte as normais para mapa interno)
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1); // Inverter norms

      // 5) CARREGA A TEXTURA 360 (mono ou stereo top-bottom)
      //    **Aqui você pode trocar o caminho pra qualquer .jpg/.png ou vídeo na pasta media**
      const loader = new THREE.TextureLoader();
      texture360 = loader.load('media/A2_Stereo.jpg', () => {
        texture360.minFilter = THREE.LinearFilter;
        texture360.magFilter = THREE.LinearFilter;
        texture360.format = THREE.RGBFormat;
      });

      // 6) SHADER PARA EXIBIR SOMENTE A METADE SUPERIOR (MODO PLANO OU OLHO ESQUERDO NO VR)
      const fragmentTopo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // mapeia vUv.y de [0,1] pra [0.5,1] = só metade superior da textura
          vec2 uv = vec2(vUv.x, vUv.y * 0.5 + 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;

      // 7) SHADER PARA EXIBIR SOMENTE A METADE INFERIOR (OLHO DIREITO NO VR)
      const fragmentBaixo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // mapeia vUv.y de [0,1] pra [0,0.5] = só metade inferior da textura
          vec2 uv = vec2(vUv.x, vUv.y * 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;

      // 8) VERTEX SHADER COMUM
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      // 9) MATERIAIS: MONO, LEFT (topo) e RIGHT (baixo)
      const materialMono = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide, // mostra dentro da esfera
      });

      const materialLeft = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide,
      });

      const materialRight = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentBaixo,
        side: THREE.BackSide,
      });

      // 10) CRIA OS MESHES (esferas) e define camadas
      //    - sphereMono: aparece somente no modo “plano” (layer 0)
      sphereMono = new THREE.Mesh(geometry, materialMono);
      sphereMono.layers.set(0);
      scene.add(sphereMono);

      //    - sphereLeft: para olho esquerdo em VR (layer 1)
      sphereLeft = new THREE.Mesh(geometry, materialLeft);
      sphereLeft.layers.set(1);
      sphereLeft.visible = false;
      scene.add(sphereLeft);

      //    - sphereRight: para olho direito em VR (layer 2)
      sphereRight = new THREE.Mesh(geometry, materialRight);
      sphereRight.layers.set(2);
      sphereRight.visible = false;
      scene.add(sphereRight);

      // 11) CONFIGURA A CÂMERA para enxergar a camada 0 no início
      camera.layers.enable(0); // só verá sphereMono no início

      // 12) EVITA que, quando a janela redimensionar, dê cagada
      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      // Chama render em loop, tanto VR quanto não-VR
      renderer.setAnimationLoop(render);
    }

    function render() {
      // Antes de desenhar, verifica se estamos em VR
      if (renderer.xr.isPresenting) {
        // Modo VR: Esconde o sphereMono e mostra as esferas estéreo
        sphereMono.visible = false;
        sphereLeft.visible = true;
        sphereRight.visible = true;

        // Pega o XR ArrayCamera (que contém as câmeras dos dois olhos)
        const xrCamera = renderer.xr.getCamera(camera);
        if (xrCamera.isArrayCamera) {
          // Desliga todas as layers antes de setar
          xrCamera.cameras.forEach((c) => {
            c.layers.disable(0);
            c.layers.disable(1);
            c.layers.disable(2);
          });

          // Câmera do olho esquerdo: ver layer 1
          const leftCam = xrCamera.cameras[0];
          leftCam.layers.enable(1);

          // Câmera do olho direito: ver layer 2
          const rightCam = xrCamera.cameras[1];
          rightCam.layers.enable(2);
        }
      } else {
        // Modo “plano” (PC ou mobile): mostra só a esfera mono (metade superior)
        sphereMono.visible = true;
        sphereLeft.visible = false;
        sphereRight.visible = false;

        // Garante que a câmera tá vendo a layer 0
        camera.layers.enable(0);
        camera.layers.disable(1);
        camera.layers.disable(2);

        // Atualiza controles de mouse/touch
        controls.update();
      }

      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Estilização básica: tela cheia, sem margens */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* Botão VR (fornecido por VRButton.js) aparece no canto */
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- O script tipo module acima já injeta o <canvas> do Three.js dinamicamente -->
</body>
</html>
