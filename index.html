<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Media Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect { margin-left: 8px; }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>
  <a-scene embedded id="scene"></a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;
    let currentEntity = null;
    let currentVideoElement = null;

    async function fetchMediaList() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      return files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);
    }

    function clearScene() {
      const scene = document.getElementById('scene');
      if (currentEntity) {
        scene.removeChild(currentEntity);
        currentEntity = null;
      }
      if (currentVideoElement) {
        document.body.removeChild(currentVideoElement);
        currentVideoElement = null;
      }
    }

    function loadMedia(filename) {
      clearScene();
      const url = `${baseUrl}/${filename}`;
      const name = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(name);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(name);
      const isStereo = /_stereo\./i.test(name);
      const scene = document.getElementById('scene');

      if (isVideo) {
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.loop = true;
        video.autoplay = true;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoElement = video;

        const vs = document.createElement('a-videosphere');
        vs.setAttribute('src', '#mediaVideo');
        if (isStereo) vs.setAttribute('stereo', 'top-bottom');
        scene.appendChild(vs);
        currentEntity = vs;

        if (isStereo) {
          applyStereoHalf(vs);
          scene.addEventListener('enter-vr', () => resetStereo(vs));
          scene.addEventListener('exit-vr', () => applyStereoHalf(vs));
        }

      } else if (isImage) {
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', url);
        if (isStereo) sky.setAttribute('stereo', 'top-bottom');
        scene.appendChild(sky);
        currentEntity = sky;

        if (isStereo) {
          applyStereoHalf(sky);
          scene.addEventListener('enter-vr', () => resetStereo(sky));
          scene.addEventListener('exit-vr', () => applyStereoHalf(sky));
        }
      }
    }

    function applyStereoHalf(entity) {
      entity.setAttribute('material', 'offset', '0 0.5');
      entity.setAttribute('material', 'repeat', '1 0.5');
    }

    function resetStereo(entity) {
      entity.setAttribute('material', 'offset', '0 0');
      entity.setAttribute('material', 'repeat', '1 1');
    }

    async function init() {
      const list = await fetchMediaList();
      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${list.length} mídia(s)`;
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      select.addEventListener('change', e => loadMedia(e.target.value));
      if (list.length) loadMedia(list[0]);
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
