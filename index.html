<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, user-scalable=no"
  />
  <title>Tour360X3 – ES Modules (exemplo mínimo)</title>
  <style>
    /* tela preta, sem margens */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* VRButton cria um botão com a classe .webxr-button */
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!--
    Aqui dentro só teremos UM <script type="module">:
    - Nenhum outro <script> “tradicional” deve tentar importar 'three' sem URL.
  -->
  <script type="module">
    // 🚫 EVITE import * from 'three';   ← ISSO DÁ ERRO
    // ✅ CORRETO: URL COMPLETO para o módulo ES
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/controls/OrbitControls.js';
    import { VRButton }   from 'https://cdn.jsdelivr.net/npm/three@0.147.0/examples/jsm/webxr/VRButton.js';

    // Checagem rápida no console:
    console.log('THREE.REVISION =', THREE.REVISION);
    console.log('OrbitControls typeof =', typeof OrbitControls);
    console.log('VRButton typeof =', typeof VRButton);

    // ———————————————
    // Apenas um cubo simples para testar
    // ———————————————
    let scene, camera, renderer, controls;

    init();
    animate();

    function init() {
      // Cena e câmera
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 2;

      // Renderer
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true; // habilita WebXR
      document.body.appendChild(renderer.domElement);

      // Se VRButton existir, adiciona botão “Enter VR”
      if (typeof VRButton === 'function') {
        document.body.appendChild(VRButton.createButton(renderer));
        console.log('VRButton adicionado');
      } else {
        console.warn('VRButton ausente (sem WebXR neste browser)');
      }

      // Controles só para rodar no modo “plano”
      controls = new OrbitControls(camera, renderer.domElement);

      // Cubo simples para vermos algo na tela
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.MeshNormalMaterial();
      const cube = new THREE.Mesh(geometry, material);
      scene.add(cube);

      // Resize listener
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function animate() {
      renderer.setAnimationLoop((_) => {
        controls.update();
        renderer.render(scene, camera);
      });
    }
  </script>
</body>
</html>
