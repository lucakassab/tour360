<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360X7 – Stereo 360 Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

    let camera, scene, renderer;

    init();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.1);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1); // Esfera invertida pra imersão

      const img = new Image();
      img.crossOrigin = 'anonymous'; // Importante pro GitHub Pages
      img.onload = () => {
        const canvasLeft = document.createElement('canvas');
        const canvasRight = document.createElement('canvas');

        const halfHeight = img.height / 2;
        canvasLeft.width = img.width;
        canvasLeft.height = halfHeight;
        canvasRight.width = img.width;
        canvasRight.height = halfHeight;

        const ctxLeft = canvasLeft.getContext('2d');
        const ctxRight = canvasRight.getContext('2d');

        // Recorta metade de cima (olho esquerdo)
        ctxLeft.drawImage(img, 0, 0, img.width, halfHeight, 0, 0, img.width, halfHeight);
        // Recorta metade de baixo (olho direito)
        ctxRight.drawImage(img, 0, halfHeight, img.width, halfHeight, 0, 0, img.width, halfHeight);

        const textureLeft = new THREE.Texture(canvasLeft);
        const textureRight = new THREE.Texture(canvasRight);
        textureLeft.needsUpdate = true;
        textureRight.needsUpdate = true;

        const materialLeft = new THREE.MeshBasicMaterial({ map: textureLeft, side: THREE.BackSide });
        const materialRight = new THREE.MeshBasicMaterial({ map: textureRight, side: THREE.BackSide });

        const meshLeft = new THREE.Mesh(geometry, materialLeft);
        const meshRight = new THREE.Mesh(geometry, materialRight);

        meshLeft.layers.set(1);  // LEFT EYE
        meshRight.layers.set(2); // RIGHT EYE

        scene.add(meshLeft);
        scene.add(meshRight);

        animate();
      };

      img.src = './media/A2_Stereo.jpg';

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    }
  </script>
</body>
</html>
