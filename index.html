<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>Tour360 - Visualizador 360° VR V1</title>

  <!-- Script ES6 revisado com URLs corretos e debugging -->
  <script type="module">
    // ================================
    // IMPORTS via jsDelivr (sem “bare import”)
    // ================================
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/webxr/VRButton.js';

    console.log('🛠️ Módulos Three.js, OrbitControls e VRButton importados com sucesso.');

    let camera, scene, renderer;
    let controls;
    let sphereMono, sphereLeft, sphereRight;
    let texture360;

    init();
    animate();

    function init() {
      console.log('⚙️ Iniciando init()...');
      // 1) CENA E CÂMERA
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.01);
      console.log('🖼️ Cena e câmera criadas.');

      // 2) RENDERER COM WebXR ATIVADO
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));
      console.log('🎮 Renderer criado e WebXR habilitado.');

      // 3) CONTROLES (mouse/touch) NO MODO NÃO-VR
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('🖱️ OrbitControls instanciados.');

      // 4) GEOMETRIA DA ESFERA (inverte normais)
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);
      console.log('⚙️ Geometria da esfera criada.');

      // 5) CARREGA A TEXTURA 360 (mono ou stereo top-bottom)
      const loader = new THREE.TextureLoader();
      console.log('📦 Carregando textura 360 de media/A2_Stereo.jpg...');
      texture360 = loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBFormat;
          console.log('✅ Textura carregada, width:', tex.image.width, 'height:', tex.image.height);
        },
        undefined,
        (err) => {
          console.error('❌ Erro ao carregar a textura 360:', err);
        }
      );

      // 6) SHADER PARA EXIBIR METADE SUPERIOR (MODO PLANO OU OLHO ESQ NO VR)
      const fragmentTopo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          vec2 uv = vec2(vUv.x, vUv.y * 0.5 + 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;

      // 7) SHADER PARA EXIBIR METADE INFERIOR (OLHO DIR NO VR)
      const fragmentBaixo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          vec2 uv = vec2(vUv.x, vUv.y * 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;

      // 8) VERTEX SHADER COMUM
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;

      console.log('📜 Shaders criados.');

      // 9) MATERIAIS: MONO, LEFT (topo) e RIGHT (baixo)
      const materialMono = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide,
      });

      const materialLeft = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide,
      });

      const materialRight = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentBaixo,
        side: THREE.BackSide,
      });

      console.log('🖌️ Materiais Mono, Left e Right criados.');

      // 10) CRIA OS MESHES e define camadas
      sphereMono = new THREE.Mesh(geometry, materialMono);
      sphereMono.layers.set(0);
      scene.add(sphereMono);

      sphereLeft = new THREE.Mesh(geometry, materialLeft);
      sphereLeft.layers.set(1);
      sphereLeft.visible = false;
      scene.add(sphereLeft);

      sphereRight = new THREE.Mesh(geometry, materialRight);
      sphereRight.layers.set(2);
      sphereRight.visible = false;
      scene.add(sphereRight);

      console.log('🔆 Meshes de esfera adicionadas à cena. SphereMono layer 0, sphereLeft layer 1, sphereRight layer 2.');

      // 11) CONFIGURA A CÂMERA para enxergar camada 0 (início)
      camera.layers.enable(0);
      console.log('🔎 Câmera inicial configurada para layer 0.');

      // 12) RESIZE HANDLER
      window.addEventListener('resize', onWindowResize);
      console.log('🔧 Listener de resize adicionado.');
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada. Nova aspect:', camera.aspect);
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render() {
      // debug: verifica se está em VR
      if (renderer.xr.isPresenting) {
        // Modo VR: exibe as esferas estéreo
        sphereMono.visible = false;
        sphereLeft.visible = true;
        sphereRight.visible = true;
        console.log('🕶️ Entrou em modo VR.');

        const xrCamera = renderer.xr.getCamera(camera);
        if (xrCamera.isArrayCamera) {
          xrCamera.cameras.forEach((c) => {
            c.layers.disable(0);
            c.layers.disable(1);
            c.layers.disable(2);
          });
          const leftCam = xrCamera.cameras[0];
          leftCam.layers.enable(1);
          const rightCam = xrCamera.cameras[1];
          rightCam.layers.enable(2);
          // debug:
          // console.log('   → Left eye layer 1, Right eye layer 2');
        }
      } else {
        // Modo plano: exibe somente sphereMono
        if (!sphereMono.visible) {
          console.log('📱 Voltou para modo plano (não-VR).');
        }
        sphereMono.visible = true;
        sphereLeft.visible = false;
        sphereRight.visible = false;
        camera.layers.enable(0);
        camera.layers.disable(1);
        camera.layers.disable(2);
        controls.update();
      }

      renderer.render(scene, camera);
    }
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- O script tipo module acima já gera tudo: canvas, VRButton etc -->
</body>
</html>
