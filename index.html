<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360X7 – Stereo 360 Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/VRButton.js';

    let camera, scene, renderer;
    let sphereLeft, sphereRight;

    init();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.1);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1); // esfera invertida pro 360 funcionar

      const loader = new THREE.TextureLoader();
      loader.load('./media/A2_Stereo.jpg', (texture) => {
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;

        // Mapeamento manual pra cada olho
        const leftEyeMaterial = new THREE.MeshBasicMaterial({
          map: texture,
          side: THREE.BackSide
        });

        const rightEyeMaterial = new THREE.MeshBasicMaterial({
          map: texture,
          side: THREE.BackSide
        });

        // Olho esquerdo = metade de cima
        leftEyeMaterial.map.offset.y = 0.5;
        leftEyeMaterial.map.repeat.y = 0.5;
        leftEyeMaterial.map.needsUpdate = true;

        // Olho direito = metade de baixo
        rightEyeMaterial.map.offset.y = 0.0;
        rightEyeMaterial.map.repeat.y = 0.5;
        rightEyeMaterial.map.needsUpdate = true;

        // Mesh pra olho esquerdo
        sphereLeft = new THREE.Mesh(geometry, leftEyeMaterial);
        sphereLeft.layers.set(1); // LEFT EYE
        scene.add(sphereLeft);

        // Mesh pra olho direito
        sphereRight = new THREE.Mesh(geometry, rightEyeMaterial);
        sphereRight.layers.set(2); // RIGHT EYE
        scene.add(sphereRight);

        animate();
      });

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    }
  </script>
</body>
</html>
