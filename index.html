<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Media Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene embedded></a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';

    async function getFirstMedia() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=main`;
      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
        const files = await res.json();
        for (const file of files) {
          if (file.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(file.name)) {
            return {
              name: file.name,
              url: `https://${owner}.github.io/${repo}/media/${file.name}`
            };
          }
        }
        return null;
      } catch (e) {
        console.error('Erro ao listar mídia no GitHub:', e);
        return null;
      }
    }

    async function init() {
      const media = await getFirstMedia();
      if (!media) {
        console.error('Nenhuma mídia encontrada em /media/ no GitHub.');
        return;
      }

      const mediaUrl = media.url;
      const name = media.name.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(name);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(name);
      const params = new URLSearchParams(window.location.search);
      const stereo = params.get('stereo') || 'mono';
      const layout = stereo === 'stereo' ? 'top-bottom' : '';
      const scene = document.querySelector('a-scene');

      if (isVideo) {
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = mediaUrl;
        video.loop = true;
        video.autoplay = true;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);

        const videosphere = document.createElement('a-videosphere');
        videosphere.setAttribute('src', '#mediaVideo');
        if (layout) videosphere.setAttribute('stereo', layout);
        scene.appendChild(videosphere);

      } else if (isImage) {
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', mediaUrl);
        if (layout) sky.setAttribute('stereo', layout);
        scene.appendChild(sky);

      } else {
        console.error('Tipo de mídia não suportado ou não reconhecido:', mediaUrl);
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
