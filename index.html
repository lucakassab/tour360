<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Tour360_3.3</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Componente que faz o split estereoscópico corretamente -->
  <script src="https://unpkg.com/aframe-stereo-component/dist/aframe-stereo-component.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>

  <!-- Cena A-Frame -->
  <a-scene id="scene" embedded vr-mode-ui="enterVRButton: true" background="color: #000">
    <!-- Aqui vamos injetar e remover entidades dinamicamente -->
  </a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;

    let currentMonoSky = null;
    let leftSky = null;
    let rightSky = null;
    let currentVideoEl = null;
    const scene = document.getElementById('scene');

    async function fetchMediaList() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      return files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);
    }

    function clearSkies() {
      // Remove qualquer entidade de 360 que estiver na cena antes
      if (currentMonoSky) {
        scene.removeChild(currentMonoSky);
        currentMonoSky = null;
      }
      if (leftSky) {
        scene.removeChild(leftSky);
        leftSky = null;
      }
      if (rightSky) {
        scene.removeChild(rightSky);
        rightSky = null;
      }
      // Remove <video> se existir
      if (currentVideoEl) {
        document.body.removeChild(currentVideoEl);
        currentVideoEl = null;
      }
    }

    function showMono(url, isVideo) {
      clearSkies();
      if (isVideo) {
        // Cria elemento <video> escondido
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoEl = video;

        // Sky de vídeo mono
        const vs = document.createElement('a-videosphere');
        vs.setAttribute('shader', 'flat');
        vs.setAttribute('src', '#mediaVideo');
        scene.appendChild(vs);
        currentMonoSky = vs;
      } else {
        // Sky de imagem estática mono
        const sky = document.createElement('a-sky');
        sky.setAttribute('shader', 'flat');
        sky.setAttribute('src', `url(${url})`);
        scene.appendChild(sky);
        currentMonoSky = sky;
      }
    }

    function showStereo(url, isVideo) {
      // Remove mono
      if (currentMonoSky) {
        scene.removeChild(currentMonoSky);
        currentMonoSky = null;
      }

      if (isVideo) {
        // Mesma lógica de criar <video>
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoEl = video;

        // Criamos DOIS a-videosphere: um pra cada olho
        leftSky = document.createElement('a-videosphere');
        leftSky.setAttribute('shader', 'flat');
        leftSky.setAttribute('src', '#mediaVideo');
        // Stereo componente: olho esquerdo, split vertical (top-bottom)
        leftSky.setAttribute('stereo', 'eye:left; split:vertical');
        scene.appendChild(leftSky);

        rightSky = document.createElement('a-videosphere');
        rightSky.setAttribute('shader', 'flat');
        rightSky.setAttribute('src', '#mediaVideo');
        // Stereo componente: olho direito
        rightSky.setAttribute('stereo', 'eye:right; split:vertical');
        scene.appendChild(rightSky);
      } else {
        // Imagem
        leftSky = document.createElement('a-sky');
        leftSky.setAttribute('shader', 'flat');
        leftSky.setAttribute('src', `url(${url})`);
        leftSky.setAttribute('stereo', 'eye:left; split:vertical');
        scene.appendChild(leftSky);

        rightSky = document.createElement('a-sky');
        rightSky.setAttribute('shader', 'flat');
        rightSky.setAttribute('src', `url(${url})`);
        rightSky.setAttribute('stereo', 'eye:right; split:vertical');
        scene.appendChild(rightSky);
      }
    }

    function loadMedia(filename) {
      clearSkies();
      const url = `${baseUrl}/${filename}`;
      const lower = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(lower);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(lower);
      const isStereo = /_stereo\./i.test(filename);

      if (isStereo) {
        // Começa mostrando mono (para testarmos fora do VR)
        showMono(url, isVideo);
      } else {
        // Se não for stereo, fica mono sempre
        showMono(url, isVideo);
      }

      // Quando o usuário entrar em VR, troca para estéreo
      scene.addEventListener('enter-vr', () => {
        if (isStereo) {
          showStereo(url, isVideo);
        }
      });

      // Quando sair do VR, volta para mono
      scene.addEventListener('exit-vr', () => {
        if (isStereo) {
          showMono(url, isVideo);
        }
      });
    }

    async function init() {
      const list = await fetchMediaList();
      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${list.length} mídia(s)`;
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      if (list.length) loadMedia(list[0]);
      select.addEventListener('change', e => loadMedia(e.target.value));
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
