<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>Tour360 V5</title>

  <!--
    ================================
    USANDO ES MODULES COM URLs EXPLÍCITOS
    ================================
    - Importa Three.js, OrbitControls e VRButton diretamente de URLs.
    - Nada de imports “bare” tipo 'three' que dão erro de specifier.
    - Versão usada: 0.150.1 (r150).
  -->
  <script type="module">
    // =========================
    // IMPORTS VIA unpkg (r150)
    // =========================
    import * as THREE from 'https://unpkg.com/three@0.150.1/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.150.1/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://unpkg.com/three@0.150.1/examples/jsm/webxr/VRButton.js';

    console.log('🛠️ THREE, OrbitControls e VRButton importados via ES Modules:');
    console.log('   • THREE.REVISION =', THREE.REVISION);
    console.log('   • OrbitControls typeof =', typeof OrbitControls);
    console.log('   • VRButton typeof =', typeof VRButton);

    // Se qualquer um desses der 'undefined' ou não for função, a porra tá errada.
    if (typeof THREE === 'undefined') {
      console.error('❌ THREE virou undefined. Verifica se o unpkg tá bloqueado ou sem internet.');
    }
    if (typeof OrbitControls !== 'function') {
      console.error('❌ OrbitControls não foi importado direito.');
    }
    if (typeof VRButton !== 'function') {
      console.error('❌ VRButton não foi importado direito.');
    }

    // ====================================
    // VARIÁVEIS GLOBAIS DO VISUALIZADOR
    // ====================================
    let camera, scene, renderer;
    let controls;
    let sphereMono, sphereLeft, sphereRight;
    let texture360;

    // ====================================
    // FUNÇÃO INIT E ANIMATE
    // ====================================
    window.addEventListener('load', () => {
      console.log('⚙️ onload: iniciando o visualizador 360° VR...');
      init();
      animate();
    });

    function init() {
      console.log('🔧 init() chamado.');

      // 1) CENA E CÂMERA
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.01);
      console.log('  • Cena e câmera criadas.');

      // 2) RENDERER COM WebXR ATIVADO
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // ADICIONA O BOTÃO “ENTER VR” se VRButton existir
      if (typeof VRButton === 'function') {
        document.body.appendChild(VRButton.createButton(renderer));
        console.log('  • VRButton adicionado ao DOM.');
      } else {
        console.warn('  • VRButton não está definido, sem botão “Enter VR”.');
      }

      console.log('  • Renderer criado. WebXR habilitado =', renderer.xr.enabled);

      // 3) OrbitControls para MODO PLANO (mouse/touch)
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('  • OrbitControls instanciado.');

      // 4) GEOMETRIA DA ESFERA (normais invertidas pra dentro)
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);
      console.log('  • Geometria da esfera criada e normais invertidas.');

      // 5) TEXTURA 360 (IMAGEM ESTÉREO TOP-BOTTOM EM media/A2_Stereo.jpg)
      const loader = new THREE.TextureLoader();
      console.log('  • Carregando textura 360 de "media/A2_Stereo.jpg"...');
      texture360 = loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBFormat;
          console.log('    ✅ Textura 360 carregada: ', tex.image.width, 'x', tex.image.height);
        },
        undefined,
        (err) => {
          console.error('    ❌ Erro ao carregar a textura 360:', err);
        }
      );

      // 6) SHADERS: metade superior (topo) e metade inferior (baixo)
      const fragmentTopo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mostra só metade superior (vUv.y ∈ [0.5,1.0])
          vec2 uv = vec2(vUv.x, vUv.y * 0.5 + 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const fragmentBaixo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mostra só metade inferior (vUv.y ∈ [0.0,0.5])
          vec2 uv = vec2(vUv.x, vUv.y * 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      console.log('  • Shaders criados.');

      // 7) MATERIAIS: Mono (metade superior), Left (topo) e Right (baixo)
      const materialMono = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialLeft = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialRight = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentBaixo,
        side: THREE.BackSide
      });
      console.log('  • Materiais Mono, Left e Right prontos.');

      // 8) CRIA OS MESHS e configura camadas
      sphereMono = new THREE.Mesh(geometry, materialMono);
      sphereMono.layers.set(0);      // layer 0 = MODO PLANO (metade superior)
      scene.add(sphereMono);

      sphereLeft = new THREE.Mesh(geometry, materialLeft);
      sphereLeft.layers.set(1);      // layer 1 = olho esquerdo VR (topo)
      sphereLeft.visible = false;
      scene.add(sphereLeft);

      sphereRight = new THREE.Mesh(geometry, materialRight);
      sphereRight.layers.set(2);     // layer 2 = olho direito VR (baixo)
      sphereRight.visible = false;
      scene.add(sphereRight);

      console.log('  • Meshes adicionadas: sphereMono(layer0), sphereLeft(layer1), sphereRight(layer2).');

      // 9) Configura câmera para ver só a layer 0 inicialmente
      camera.layers.enable(0);
      console.log('  • Câmera configurada para layer 0 (modo plano).');

      // 10) Listener de resize
      window.addEventListener('resize', onWindowResize);
      console.log('  • Listener de resize adicionado.');
    }

    // =========================================
    // FUNÇÃO DE REDIMENSIONAMENTO
    // =========================================
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada: ', window.innerWidth, 'x', window.innerHeight);
    }

    // =========================================
    // LOOP DE ANIMAÇÃO
    // =========================================
    function animate() {
      renderer.setAnimationLoop(render);
    }

    // =========================================
    // FUNÇÃO DE RENDER (chamada todo frame)
    // =========================================
    function render() {
      if (renderer.xr.isPresenting) {
        // Entrou em modo VR: exibe o estéreo
        if (sphereMono.visible) {
          console.log('🕶️ Entrou em modo VR.');
        }
        sphereMono.visible = false;
        sphereLeft.visible = true;
        sphereRight.visible = true;

        const xrCamera = renderer.xr.getCamera(camera);
        if (xrCamera && xrCamera.isArrayCamera) {
          // Desativa todas as camadas
          xrCamera.cameras.forEach((c) => {
            c.layers.disable(0);
            c.layers.disable(1);
            c.layers.disable(2);
          });
          // Olho esquerdo -> layer 1; olho direito -> layer 2
          xrCamera.cameras[0].layers.enable(1);
          xrCamera.cameras[1].layers.enable(2);
        }
      } else {
        // Modo plano: exibe só sphereMono
        if (!sphereMono.visible) {
          console.log('📱 Voltou para modo plano (não-VR).');
        }
        sphereMono.visible = true;
        sphereLeft.visible = false;
        sphereRight.visible = false;
        camera.layers.enable(0);
        camera.layers.disable(1);
        camera.layers.disable(2);
        controls.update();
      }

      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Tela preta, zero margens, canvas full screen */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* VRButton.js já aplica a classe .webxr-button */
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!--
    O script acima injeta o <canvas> e o botão VR (se houver suporte).
    Não precisa colocar nada aqui.
  -->
</body>
</html>
