<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>WebXR Stereo 360 Tour (Top/Bottom)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0b; color: #eaeaea; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    #app { position: fixed; inset: 0; display: grid; place-items: center; }
    .panel {
      width: min(720px, calc(100vw - 24px));
      background: rgba(20,20,20,0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 16px 60px rgba(0,0,0,0.6);
    }
    h1 { font-size: 18px; margin: 0 0 10px; font-weight: 650; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      background: #2b6cff;
      color: #fff;
      font-weight: 650;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .ghost { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.14); }
    .muted { color: rgba(255,255,255,0.72); font-size: 13px; line-height: 1.35; margin-top: 10px; }
    #status { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,0.85); white-space: pre-line; }
    #canvasWrap { position: fixed; inset: 0; display: none; }
    #hint {
      position: fixed; left: 12px; bottom: 12px;
      padding: 10px 12px; border-radius: 12px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      display: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h1>Tour VR — 360° Estéreo (Top/Bottom)</h1>

      <div class="row">
        <button id="loadBtn">Carregar Tour2</button>
        <button id="swapBtn" class="ghost" title="Swap Left/Right (olhos)">Inverter Olhos</button>
      </div>

      <div id="status">Pronto. Abre no Quest e clica em Carregar Tour.</div>

      <div class="muted">
        Controles no VR: <b>A</b> = próxima, <b>B</b> = anterior.<br/>
        Se o estéreo ficar invertido, usa <b>Inverter Olhos</b>.
      </div>
    </div>
  </div>

  <div id="canvasWrap"></div>
  <div id="hint">A: próxima • B: anterior</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.183.1/build/three.module.js';

    const CONFIG = {
      imageFolder: 'tour',
      branch: 'main',
      github: { owner: null, repo: null },
      siteBaseOverride: null,

      swapEyes: false,

      xrFramebufferScaleFactor: 1.25,
      xrFoveation: 0.0,

      useMipmaps: false,
      magFilter: 'Linear',
      minFilter: 'Linear',
    };

    const appEl = document.getElementById('app');
    const loadBtn = document.getElementById('loadBtn');
    const swapBtn = document.getElementById('swapBtn');
    const statusEl = document.getElementById('status');
    const canvasWrap = document.getElementById('canvasWrap');
    const hintEl = document.getElementById('hint');

    function setStatus(msg) { statusEl.textContent = msg; }
    function panic(msg, err) {
      console.error(msg, err);
      setStatus(`${msg}${err ? '\n(Abre o console pra ver o erro)' : ''}`);
      loadBtn.disabled = false;
    }

    function inferGitHubRepo() {
      if (CONFIG.github.owner && CONFIG.github.repo) return { owner: CONFIG.github.owner, repo: CONFIG.github.repo };
      const host = location.hostname.toLowerCase();
      if (host.endsWith('github.io')) {
        const owner = host.split('.')[0];
        const parts = location.pathname.split('/').filter(Boolean);
        const repo = (parts.length > 0) ? parts[0] : `${owner}.github.io`;
        return { owner, repo };
      }
      return { owner: CONFIG.github.owner, repo: CONFIG.github.repo };
    }

    function inferSiteBase(owner, repo) {
      if (CONFIG.siteBaseOverride) return CONFIG.siteBaseOverride;
      const origin = location.origin;
      const host = location.hostname.toLowerCase();
      if (owner && host === `${owner}.github.io`) {
        if (repo && repo !== `${owner}.github.io`) return `${origin}/${repo}/`;
        return `${origin}/`;
      }
      return `${origin}/`;
    }

    async function fetchImageListFromGitHub(owner, repo) {
      if (!owner || !repo) throw new Error('Não consegui inferir owner/repo. Preenche CONFIG.github.owner/repo.');

      const tryBranches = [CONFIG.branch, CONFIG.branch === 'main' ? 'master' : 'main']
        .filter((v, i, a) => v && a.indexOf(v) === i);

      for (const br of tryBranches) {
        const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(CONFIG.imageFolder)}?ref=${encodeURIComponent(br)}`;
        const res = await fetch(apiUrl, { headers: { 'Accept': 'application/vnd.github+json' } });

        if (res.ok) {
          const data = await res.json();
          if (!Array.isArray(data)) throw new Error('A pasta não retornou uma lista (confere imageFolder).');

          const exts = new Set(['.jpg', '.jpeg', '.png', '.webp']);
          return data
            .filter(it => it && it.type === 'file' && typeof it.name === 'string')
            .filter(it => {
              const n = it.name.toLowerCase();
              for (const e of exts) if (n.endsWith(e)) return true;
              return false;
            })
            .map(it => ({ name: it.name, path: it.path }))
            .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));
        }

        if (res.status !== 404) {
          const txt = await res.text().catch(() => '');
          throw new Error(`GitHub API falhou: HTTP ${res.status}. ${txt}`);
        }
      }

      throw new Error(`Não achei a pasta /${CONFIG.imageFolder}/ nas branches testadas (${tryBranches.join(', ')}).`);
    }

    // ========= Three/WebXR =========
    let renderer, scene, camera;
    let sphereGeo, leftSphere, rightSphere;
    let currentBaseTexture = null;
    let leftTex = null, rightTex = null;
    let images = [];
    let currentIndex = 0;

    const prevPressed = new Map();
    function isJustPressed(handedness, gamepad, btnIndex) {
      const btn = gamepad?.buttons?.[btnIndex];
      if (!btn) return false;
      const key = `${handedness}:${btnIndex}`;
      const was = prevPressed.get(key) === true;
      const now = btn.pressed === true;
      prevPressed.set(key, now);
      return now && !was;
    }

    function initThreeIfNeeded() {
      if (renderer) return;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;

      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.NoToneMapping;
      renderer.toneMappingExposure = 1.0;

      if (renderer.xr.setFramebufferScaleFactor) renderer.xr.setFramebufferScaleFactor(CONFIG.xrFramebufferScaleFactor);
      if (renderer.xr.setFoveation) renderer.xr.setFoveation(CONFIG.xrFoveation);

      canvasWrap.style.display = 'block';
      canvasWrap.appendChild(renderer.domElement);

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
      camera.position.set(0, 1.6, 0);

      camera.layers.enable(1);
      camera.layers.enable(2);

      sphereGeo = new THREE.SphereGeometry(10, 96, 72);

      window.addEventListener('resize', () => {
        if (!renderer || !camera) return;
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') nextImage();
        if (e.key === 'ArrowLeft') prevImage();
      });
    }

    function applyTextureQuality(tex) {
      // ✅ FIX: sem flipY; com offset/repeat fica certo e não vira de cabeça pra baixo
      tex.flipY = true;

      tex.colorSpace = THREE.SRGBColorSpace;

      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;

      const maxAniso = renderer?.capabilities?.getMaxAnisotropy?.() || 1;
      tex.anisotropy = Math.max(1, maxAniso);

      const mag = (CONFIG.magFilter === 'Nearest') ? THREE.NearestFilter : THREE.LinearFilter;

      tex.generateMipmaps = false;
      tex.minFilter = (CONFIG.minFilter === 'Nearest') ? THREE.NearestFilter : THREE.LinearFilter;
      tex.magFilter = mag;

      tex.needsUpdate = true;
    }

    async function loadImageMaybeDownscale(url, maxTexSize) {
      const res = await fetch(url, { mode: 'cors' });
      if (!res.ok) throw new Error(`Falha baixando imagem: HTTP ${res.status}`);
      const blob = await res.blob();

      let bmp = null;
      try { bmp = await createImageBitmap(blob); } catch {}

      const toCanvas = async (source, outW, outH) => {
        const canvas = document.createElement('canvas');
        canvas.width = outW;
        canvas.height = outH;
        const ctx = canvas.getContext('2d', { alpha: false });
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(source, 0, 0, outW, outH);
        return canvas;
      };

      if (bmp) {
        const w = bmp.width, h = bmp.height;
        const need = (w > maxTexSize || h > maxTexSize);
        if (!need) return { image: bmp, kind: 'bitmap', resized: false, srcW: w, srcH: h, outW: w, outH: h };

        const scale = Math.min(maxTexSize / w, maxTexSize / h);
        const outW = Math.max(1, Math.floor(w * scale));
        const outH = Math.max(1, Math.floor(h * scale));

        try {
          const resized = await createImageBitmap(blob, { resizeWidth: outW, resizeHeight: outH, resizeQuality: 'high' });
          bmp.close?.();
          return { image: resized, kind: 'bitmap', resized: true, srcW: w, srcH: h, outW, outH };
        } catch {
          const canvas = await toCanvas(bmp, outW, outH);
          bmp.close?.();
          return { image: canvas, kind: 'canvas', resized: true, srcW: w, srcH: h, outW, outH };
        }
      }

      const img = await new Promise((resolve, reject) => {
        const im = new Image();
        im.crossOrigin = 'anonymous';
        im.onload = () => resolve(im);
        im.onerror = reject;
        im.src = URL.createObjectURL(blob);
      });

      const w = img.naturalWidth || img.width;
      const h = img.naturalHeight || img.height;
      const need = (w > maxTexSize || h > maxTexSize);

      if (!need) return { image: img, kind: 'img', resized: false, srcW: w, srcH: h, outW: w, outH: h };

      const scale = Math.min(maxTexSize / w, maxTexSize / h);
      const outW = Math.max(1, Math.floor(w * scale));
      const outH = Math.max(1, Math.floor(h * scale));

      const canvas = await toCanvas(img, outW, outH);
      return { image: canvas, kind: 'canvas', resized: true, srcW: w, srcH: h, outW, outH };
    }

    function disposeEyeTextures() {
      if (leftTex) { leftTex.dispose(); leftTex = null; }
      if (rightTex) { rightTex.dispose(); rightTex = null; }
    }

    function rebuildSpheresWithBaseTexture(baseTex) {
      if (leftSphere) scene.remove(leftSphere);
      if (rightSphere) scene.remove(rightSphere);

      disposeEyeTextures();

      const yScale = 0.5;

      // ✅ FIX: com flipY=false, o "topo" do arquivo fica na metade de cima do UV (v=0.5..1.0)
      const topOffset = 0.5;
      const bottomOffset = 0.0;

      const leftYOffset  = CONFIG.swapEyes ? bottomOffset : topOffset;
      const rightYOffset = CONFIG.swapEyes ? topOffset : bottomOffset;

      leftTex = baseTex.clone();
      rightTex = baseTex.clone();

      leftTex.repeat.set(1, yScale);
      rightTex.repeat.set(1, yScale);

      leftTex.offset.set(0, leftYOffset);
      rightTex.offset.set(0, rightYOffset);

      applyTextureQuality(leftTex);
      applyTextureQuality(rightTex);

      const leftMat = new THREE.MeshBasicMaterial({ map: leftTex, side: THREE.BackSide, depthWrite: false, toneMapped: false });
      const rightMat = new THREE.MeshBasicMaterial({ map: rightTex, side: THREE.BackSide, depthWrite: false, toneMapped: false });

      leftSphere = new THREE.Mesh(sphereGeo, leftMat);
      rightSphere = new THREE.Mesh(sphereGeo, rightMat);

      leftSphere.layers.set(1);
      rightSphere.layers.set(2);

      scene.add(leftSphere);
      scene.add(rightSphere);
    }

    async function loadTextureForIndex(idx) {
      const item = images[idx];
      if (!item) return;

      const mts = renderer?.capabilities?.maxTextureSize ?? 0;
      const maxTexSize = mts || 4096;

      setStatus(`Carregando: ${item.name} (${idx + 1}/${images.length})\nmaxTextureSize: ${mts}`);

      if (currentBaseTexture) {
        currentBaseTexture.userData?._bitmap?.close?.();
        currentBaseTexture.dispose();
        currentBaseTexture = null;
      }

      const loaded = await loadImageMaybeDownscale(item.url, maxTexSize);

      let tex;
      if (loaded.kind === 'canvas') tex = new THREE.CanvasTexture(loaded.image);
      else tex = new THREE.Texture(loaded.image);
      if (loaded.kind === 'bitmap') tex.userData._bitmap = loaded.image;

      applyTextureQuality(tex);
      currentBaseTexture = tex;
      rebuildSpheresWithBaseTexture(tex);

      const warn = loaded.resized
        ? `\n⚠️ Downscale: ${loaded.srcW}x${loaded.srcH} -> ${loaded.outW}x${loaded.outH} (limite GPU ${maxTexSize})`
        : '';

      setStatus(`OK: ${item.name} (${idx + 1}/${images.length})\nRes: ${loaded.outW}x${loaded.outH} | maxTextureSize: ${mts}\nXR scale: ${CONFIG.xrFramebufferScaleFactor} | foveation: ${CONFIG.xrFoveation}${warn}`);
    }

    function nextImage() {
      if (!images.length) return;
      currentIndex = (currentIndex + 1) % images.length;
      loadTextureForIndex(currentIndex).catch(err => panic('Falha carregando textura', err));
    }

    function prevImage() {
      if (!images.length) return;
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      loadTextureForIndex(currentIndex).catch(err => panic('Falha carregando textura', err));
    }

    function pollControllerButtons() {
      const session = renderer?.xr?.getSession?.();
      if (!session) return;

      for (const src of session.inputSources) {
        if (src?.targetRayMode !== 'tracked-pointer') continue;
        if (src?.handedness !== 'right') continue;
        const gp = src.gamepad;
        if (!gp) continue;

        if (isJustPressed('right', gp, 4)) nextImage();
        if (isJustPressed('right', gp, 5)) prevImage();
      }
    }

    function startRenderLoop() {
      renderer.setAnimationLoop(() => {
        pollControllerButtons();
        renderer.render(scene, camera);
      });
    }

    function forceXREyeLayers() {
      const xrCam = renderer.xr.getCamera(camera);
      if (xrCam && xrCam.cameras && xrCam.cameras.length >= 2) {
        xrCam.cameras[0].layers.set(1);
        xrCam.cameras[1].layers.set(2);
      }
    }

    async function enterVR() {
      if (!('xr' in navigator)) throw new Error('WebXR não disponível nesse browser/device.');
      const supported = await navigator.xr.isSessionSupported('immersive-vr');
      if (!supported) throw new Error('Esse browser não suporta immersive-vr.');

      const session = await navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] });

      session.addEventListener('end', () => {
        hintEl.style.display = 'none';
        appEl.style.display = 'grid';
        setStatus('Sessão VR finalizada.');
      });

      await renderer.xr.setSession(session);
      forceXREyeLayers();

      hintEl.style.display = 'block';
      appEl.style.display = 'none';
    }

    swapBtn.addEventListener('click', () => {
      CONFIG.swapEyes = !CONFIG.swapEyes;
      setStatus(CONFIG.swapEyes ? 'Olhos invertidos (swap L/R): ON' : 'Olhos invertidos (swap L/R): OFF');
      if (currentBaseTexture) rebuildSpheresWithBaseTexture(currentBaseTexture);
      try { forceXREyeLayers(); } catch {}
    });

    loadBtn.addEventListener('click', async () => {
      loadBtn.disabled = true;

      try {
        initThreeIfNeeded();
        startRenderLoop();

        setStatus('Entrando em VR...');
        await enterVR();

        setStatus('Buscando imagens no repo...');
        const { owner, repo } = inferGitHubRepo();
        const siteBase = inferSiteBase(owner, repo);

        const list = await fetchImageListFromGitHub(owner, repo);
        if (!list.length) throw new Error(`Nenhuma imagem achada em /${CONFIG.imageFolder}/`);

        images = list.map(it => ({ name: it.name, url: new URL(it.path, siteBase).toString() }));

        setStatus(`Achei ${images.length} imagem(ns). Carregando a primeira...`);
        await loadTextureForIndex(0);
        currentIndex = 0;

        forceXREyeLayers();
      } catch (err) {
        panic('Deu merda pra iniciar o tour', err);
      } finally {
        if (appEl.style.display !== 'none') loadBtn.disabled = false;
      }
    });

    setStatus('Pronto. Clica em "Carregar Tour".');
  </script>
</body>
</html>
