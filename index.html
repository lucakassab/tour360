<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360 A-FrameV1</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene>
    <a-assets>
      <!-- URL absoluto pro raw do GitHub -->
      <img id="stereo360" src="https://raw.githubusercontent.com/lucakassab/tour360/main/media/A2_Stereo.jpg" crossorigin="anonymous">
      <!-- Debug: mostra erro no console se falhar -->
    </a-assets>

    <!-- a-sky com DEBUG: se a imagem não carregar, aparece msg no console da A-Frame -->
    <a-sky src="#stereo360" stereo="top-bottom" rotation="0 -90 0"></a-sky>

    <a-entity camera look-controls wasd-controls-enabled="false"></a-entity>
  </a-scene>
</body>
</html>
