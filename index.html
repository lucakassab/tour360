<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360 – 360° Estéreo com Three.js ES Modules</title>

  <!--
    Vamos usar ES Modules apontando direto para o Unpkg (versão 0.147.0).
    Nenhum “bare import” tipo 'three'; tudo é URL explícito.
  -->
  <script type="module">
    // ===============================
    // 1) IMPORTS via Unpkg (r147)
    // ===============================
    import * as THREE from 'https://unpkg.com/three@0.147.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.147.0/examples/jsm/controls/OrbitControls.js';
    import { VRButton } from 'https://unpkg.com/three@0.147.0/examples/jsm/webxr/VRButton.js';

    console.log('🛠️ Módulos importados:');
    console.log('   • THREE.REVISION =', THREE.REVISION);
    console.log('   • OrbitControls typeof =', typeof OrbitControls);
    console.log('   • VRButton typeof =', typeof VRButton);

    // ===============================
    // 2) VARIÁVEIS GLOBAIS
    // ===============================
    let camera, scene, renderer;
    let controls;
    let sphereMono, sphereLeft, sphereRight;
    let texture360;

    // ===============================
    // 3) INICIALIZAÇÃO AO CARREGAR
    // ===============================
    window.addEventListener('load', () => {
      console.log('⚙️ [onload] Iniciando visualizador 360° estéreo (ESM)...');
      init();
      animate();
    });

    function init() {
      console.log('🔧 [init] chamado.');

      // 3.1) CENA E CÂMERA
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.01);
      console.log('  • Cena e câmera criadas.');

      // 3.2) RENDERER COM WebXR ativado
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // 3.3) VRButton: adiciona botão “Enter VR” se o browser suportar WebXR
      if (typeof VRButton === 'function') {
        document.body.appendChild(VRButton.createButton(renderer));
        console.log('  • VRButton adicionado ao DOM.');
      } else {
        console.warn('  • VRButton não está definido; sem botão “Enter VR”.');
      }
      console.log('  • Renderer criado. WebXR habilitado =', renderer.xr.enabled);

      // 3.4) OrbitControls para modo “plano” (PC/celular sem VR)
      controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('  • OrbitControls instanciado.');

      // 3.5) GEOMETRIA DA ESFERA (normais invertidas pra ver de dentro)
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);
      console.log('  • Geometria da esfera criada e normais invertidas.');

      // 3.6) CARREGA A TEXTURA 360° ESTÉREO (top-bottom) de media/A2_Stereo.jpg
      const loader = new THREE.TextureLoader();
      console.log('  • Carregando textura 360 de "./media/A2_Stereo.jpg"...');
      texture360 = loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBFormat;
          console.log('    ✅ Textura carregada:', tex.image.width + '×' + tex.image.height);
        },
        undefined,
        (err) => {
          console.error('    ❌ Erro ao carregar a textura 360 (404 ou outro):', err);
        }
      );

      // 3.7) SHADERS: fragmentTopo exibe metade superior; fragmentBaixo exibe metade inferior
      const fragmentTopo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mapeia vUv.y ∈ [0,1] para [0.5,1] → metade superior
          vec2 uv = vec2(vUv.x, vUv.y * 0.5 + 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const fragmentBaixo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mapeia vUv.y ∈ [0,1] para [0,0.5] → metade inferior
          vec2 uv = vec2(vUv.x, vUv.y * 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      console.log('  • Shaders criados.');

      // 3.8) MATERIAIS: Mono (metade superior, para modo plano);
      //                Left (metade superior, foto para olho esquerdo em VR);
      //                Right (metade inferior, foto para olho direito em VR).
      const materialMono = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialLeft = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialRight = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentBaixo,
        side: THREE.BackSide
      });
      console.log('  • Materiais Mono, Left e Right prontos.');

      // 3.9) CRIA OS MESHS e configura camadas
      sphereMono = new THREE.Mesh(geometry, materialMono);
      sphereMono.layers.set(0); // layer 0 = modo plano (metade superior)
      scene.add(sphereMono);

      sphereLeft = new THREE.Mesh(geometry, materialLeft);
      sphereLeft.layers.set(1); // layer 1 = olho esquerdo VR (metade superior)
      sphereLeft.visible = false;
      scene.add(sphereLeft);

      sphereRight = new THREE.Mesh(geometry, materialRight);
      sphereRight.layers.set(2); // layer 2 = olho direito VR (metade inferior)
      sphereRight.visible = false;
      scene.add(sphereRight);

      console.log('  • Meshes adicionadas: sphereMono(layer0), sphereLeft(layer1), sphereRight(layer2).');

      // 3.10) CÂMERA VÊ APENAS layer 0 NO INÍCIO
      camera.layers.enable(0);
      console.log('  • Câmera configurada para layer 0 (modo plano).');

      // 3.11) LISTENER PARA REDIMENSIONAMENTO
      window.addEventListener('resize', onWindowResize);
      console.log('  • Listener de resize adicionado.');
    }

    // ===============================
    // 4) REDIMENSIONA AO MUDAR TELA
    // ===============================
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada para', window.innerWidth + '×' + window.innerHeight);
    }

    // ===============================
    // 5) LOOP DE ANIMAÇÃO
    // ===============================
    function animate() {
      renderer.setAnimationLoop(render);
    }

    // ===============================
    // 6) RENDERIZA CADA FRAME
    // ===============================
    function render() {
      if (renderer.xr.isPresenting) {
        // Entrou em VR: troca para exibir as esferas estéreo
        if (sphereMono.visible) {
          console.log('🕶️ Entrou em modo VR.');
        }
        sphereMono.visible = false;
        sphereLeft.visible = true;
        sphereRight.visible = true;

        // Pega a câmera XR (ArrayCamera com dois sub-campos: câm. esq/esq e dir)
        const xrCam = renderer.xr.getCamera(camera);
        if (xrCam && xrCam.isArrayCamera) {
          // Desliga todas as layers em cada sub-câmera
          xrCam.cameras.forEach((c) => {
            c.layers.disable(0);
            c.layers.disable(1);
            c.layers.disable(2);
          });
          // Corta top-bottom:
          //   • Olho esquerdo (índice 0) → layer 1 (metade superior)
          //   • Olho direito (índice 1) → layer 2 (metade inferior)
          xrCam.cameras[0].layers.enable(1);
          xrCam.cameras[1].layers.enable(2);
        }
      } else {
        // Modo plano: exibe somente sphereMono
        if (!sphereMono.visible) {
          console.log('📱 Voltou para modo plano (não-VR).');
        }
        sphereMono.visible = true;
        sphereLeft.visible = false;
        sphereRight.visible = false;
        camera.layers.enable(0);
        camera.layers.disable(1);
        camera.layers.disable(2);
        controls.update();
      }

      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Deixa a tela toda preta, sem margens, canvas full-screen */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* O VRButton cria a classe .webxr-button; posicionamos ela aqui */
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!-- 
    O script ES Module acima já injeta o <canvas> e o botão VR se tiver suporte WebXR. 
    Não precisa colocar nada mais no <body>.
  -->
</body>
</html>
