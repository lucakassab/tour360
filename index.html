<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Tour360_1.4</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    #debug {
      position: absolute;
      top: 0;
      left: 0;
      color: #0f0;
      background: rgba(0, 0, 0, 0.7);
      font-family: monospace;
      font-size: 12px;
      padding: 5px;
      z-index: 999;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="debug">[DEBUG] Iniciando teste minimalista...</div>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const debugDiv = document.getElementById('debug');
    function debug(msg) {
      console.log(msg);
      const p = document.createElement('div');
      p.textContent = `[DEBUG] ${msg}`;
      debugDiv.appendChild(p);
      debugDiv.scrollTop = debugDiv.scrollHeight;
    }

    let camera, scene, renderer;

    debug('1) Chamando init() minimalista');
    init();

    function init() {
      debug('2) Criando cena e câmera');
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.1);

      debug('3) Configurando renderer (SEM VR agora)');
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      debug('4) Criando geometria da esfera');
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);

      debug('5) Carregando textura com força no LinearFilter e sem mipmaps');
      const loader = new THREE.TextureLoader();
      loader.load(
        './media/A2_Stereo.jpg',
        (texture) => {
          debug('6) Textura carregada (dimensões: ' + texture.image.width + 'x' + texture.image.height + ')');

          // Força NPOT funcionar
          texture.minFilter = THREE.LinearFilter;
          texture.generateMipmaps = false;
          texture.needsUpdate = true;
          debug('7) Ajustado minFilter=LinearFilter e generateMipmaps=false');

          debug('8) Criando material com a textura');
          const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.BackSide });

          debug('9) Criando mesh da esfera e adicionando à cena');
          const sphere = new THREE.Mesh(geometry, material);
          scene.add(sphere);

          debug('10) Chamando animate() para renderizar');
          animate();
        },
        undefined,
        (err) => {
          debug('Erro ao carregar textura: ' + err);
        }
      );

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      debug('Resize detectado, ajustando câmera e renderer');
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(() => {
        renderer.render(scene, camera);
      });
    }
  </script>
</body>
</html>
