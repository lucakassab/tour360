<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Media Viewer V3</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>

  <!-- Cena A-Frame -->
  <a-scene embedded id="scene">
    <!-- Camera defaults; pro VR funcionar, não precisa botar nada extra além do enter-vr button padrão -->
  </a-scene>

  <script>
    // Configurações do seu repositório
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;

    let currentEntity = null;
    let currentVideoElement = null;

    // Pega lista de arquivos no GitHub
    async function fetchMediaList() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      return files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);
    }

    // Remove entidade atual da cena e video se tiver
    function clearScene() {
      const scene = document.getElementById('scene');
      if (currentEntity) {
        scene.removeChild(currentEntity);
        currentEntity = null;
      }
      if (currentVideoElement) {
        document.body.removeChild(currentVideoElement);
        currentVideoElement = null;
      }
    }

    // Exibe só a metade de cima no modo 2D (mesmo pro conteúdo estéreo)
    function applyStereoHalf(entity) {
      // Força o material para top-bottom, mas joga o UV na metade de cima
      entity.setAttribute('material.stereo', 'top-bottom');
      entity.setAttribute('material.offset', '0 0.5');
      entity.setAttribute('material.repeat', '1 0.5');
      // Força update no Three.js
      forceMaterialUpdate(entity);
    }

    // Reseta para mostrar estéreo completo no VR: cada olho vê a metade correta
    function resetStereo(entity) {
      entity.setAttribute('material.stereo', 'top-bottom');
      entity.setAttribute('material.offset', '0 0');
      entity.setAttribute('material.repeat', '1 1');
      forceMaterialUpdate(entity);
    }

    // Força atualização da textura/material (Three.js)
    function forceMaterialUpdate(entity) {
      const mesh = entity.getObject3D('mesh');
      if (mesh && mesh.material) {
        if (mesh.material.map) mesh.material.map.needsUpdate = true;
        mesh.material.needsUpdate = true;
      }
    }

    // Carrega a mídia selecionada (imagem ou vídeo)
    function loadMedia(filename) {
      clearScene();
      const url = `${baseUrl}/${filename}`;
      const name = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(name);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(name);
      const isStereo = /_stereo\./i.test(name);
      const scene = document.getElementById('scene');

      if (isVideo) {
        // Cria elemento de vídeo
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.loop = true;
        video.autoplay = true;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoElement = video;

        // Cria videosphere
        const vs = document.createElement('a-videosphere');
        vs.setAttribute('src', '#mediaVideo');
        vs.setAttribute('rotation', '0 -90 0'); // se quiser girar a view default, opcional
        if (isStereo) {
          // Configura pra top-bottom e joga UV na metade superior
          vs.setAttribute('material.stereo', 'top-bottom');
          vs.setAttribute('material.offset', '0 0.5');
          vs.setAttribute('material.repeat', '1 0.5');
        }
        scene.appendChild(vs);
        currentEntity = vs;

      } else if (isImage) {
        // Cria sky para imagens
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', url);
        sky.setAttribute('rotation', '0 -90 0'); // opcional, se quiser girar a câmera
        if (isStereo) {
          sky.setAttribute('material.stereo', 'top-bottom');
          sky.setAttribute('material.offset', '0 0.5');
          sky.setAttribute('material.repeat', '1 0.5');
        }
        scene.appendChild(sky);
        currentEntity = sky;

      } else {
        console.error('Tipo de mídia não suportado:', url);
      }
    }

    async function init() {
      const list = await fetchMediaList();
      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${list.length} mídia(s)`;
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      if (list.length) loadMedia(list[0]);
      select.addEventListener('change', e => loadMedia(e.target.value));

      // Eventos de VR do A-Frame
      const sceneEl = document.getElementById('scene');
      sceneEl.addEventListener('enter-vr', () => {
        if (currentEntity) {
          // Dá um tempinho pro A-Frame entrar no VR antes de resetar
          setTimeout(() => {
            const filename = document.getElementById('mediaSelect').value.toLowerCase();
            if (/_stereo\./i.test(filename)) {
              // Se for estéreo, exibe tudo top-bottom
              resetStereo(currentEntity);
            }
            // Se não for estéreo, nada a fazer (já tá monoscópico)
          }, 100);
        }
      });
      sceneEl.addEventListener('exit-vr', () => {
        if (currentEntity) {
          setTimeout(() => {
            const filename = document.getElementById('mediaSelect').value.toLowerCase();
            if (/_stereo\./i.test(filename)) {
              // Se for estéreo, volta a exibir só metade de cima no 2D
              applyStereoHalf(currentEntity);
            }
          }, 100);
        }
      });
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
