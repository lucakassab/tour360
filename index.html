<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
<title>Tour360_1.6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- A-Frame CDN -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    .menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
    select, button {
      margin-top: 5px;
      width: 100%;
      padding: 4px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="menu">
    <label for="mediaSelect">Escolha uma mídia:</label>
    <select id="mediaSelect">
      <!-- Opções preenchidas pelo script -->
    </select>
    <button onclick="loadMedia()">Carregar</button>
  </div>

  <a-scene vr-mode-ui="enabled: true">
    <a-assets id="assetContainer"></a-assets>
    <!-- 
      a-sky vai receber src e stereo dinamicamente no JS.
      rotation evita a imagem ficar “de lado”.
    -->
    <a-sky id="sky" rotation="0 -90 0"></a-sky>
    <a-camera wasd-controls-enabled="false" look-controls="true"></a-camera>
  </a-scene>

  <script>
    // URL base onde as mídias ficam hospedadas
    var BASE_MEDIA_URL = 'https://lucakassab.github.io/tour360/media';

    // Lista estática de arquivos na pasta media/
    var MEDIA_FILES = [
      'A2_Stereo.jpg',
      'B1_Mono.jpg',
      'C3_Stereo.png'
      // Se adicionar mais arquivos, inclua aqui
    ];

    window.addEventListener('load', function() {
      populateMediaList();
    });

    function populateMediaList() {
      var selectEl = document.getElementById('mediaSelect');
      selectEl.innerHTML = ''; // limpa

      if (MEDIA_FILES.length === 0) {
        var optNone = document.createElement('option');
        optNone.value = '';
        optNone.textContent = 'Nenhuma mídia configurada';
        selectEl.appendChild(optNone);
        return;
      }

      MEDIA_FILES.forEach(function(filename) {
        var opt = document.createElement('option');
        opt.value = filename;
        var label = filename.replace(/(\.jpg|\.jpeg|\.png)$/i, '');
        opt.textContent = label;
        selectEl.appendChild(opt);
      });

      selectEl.selectedIndex = 0;
    }

    function loadMedia() {
      var selectEl = document.getElementById('mediaSelect');
      var selected = selectEl.value;
      if (!selected) return;

      var isStereo = (selected.toLowerCase().indexOf('_stereo') !== -1);
      var skyEl = document.getElementById('sky');
      var assetContainer = document.getElementById('assetContainer');

      // Limpa assets antigos e atributos do sky
      assetContainer.innerHTML = '';
      skyEl.removeAttribute('material');
      skyEl.removeAttribute('stereo');
      skyEl.removeAttribute('offset');

      // URL completa da imagem 360
      var mediaUrl = BASE_MEDIA_URL + '/' + selected;

      // Cria <img> dentro de <a-assets> para o A-Frame pré-carregar
      var imgEl = document.createElement('img');
      imgEl.setAttribute('id', 'media360');
      imgEl.setAttribute('src', mediaUrl);
      assetContainer.appendChild(imgEl);

      imgEl.onload = function() {
        var scene = document.querySelector('a-scene');
        var isVR = false;
        try {
          isVR = scene.renderer.xr && scene.renderer.xr.isPresenting;
        } catch (e) {
          isVR = false;
        }

        if (isStereo) {
          if (isVR) {
            // -------- VR + Stereo Top-Bottom --------
            // Deixe o A-Frame usar o split interno “top-bottom”:
            skyEl.setAttribute('src', '#media360');
            skyEl.setAttribute('stereo', 'top-bottom');
            // Não precisa de repeat/offset em VR, pois o A-Frame já faz internamente
          } else {
            // -------- 2D + Stereo (fake mono) --------
            // Mostra só a metade de cima (repeat:1 0.5 e offset:0 0.5)
            skyEl.setAttribute('material',
              'shader: flat; src: #media360; side: back; npot: true; repeat: 1 0.5');
            skyEl.setAttribute('offset', '0 0.5');
          }
        } else {
          // -------- Mono (2D ou VR) --------
          // Exibe a imagem inteira:
          skyEl.setAttribute('src', '#media360');
          skyEl.setAttribute('material',
            'shader: flat; src: #media360; side: back; npot: true; repeat: 1 1');
          skyEl.removeAttribute('stereo');
        }

        // Ajuste de rotação se a imagem ainda estiver meio torta:
        // skyEl.setAttribute('rotation', '0 -90 0');
      };

      imgEl.onerror = function() {
        console.error('Falha ao carregar mídia: ' + mediaUrl);
      };
    }
  </script>
</body>
</html>
