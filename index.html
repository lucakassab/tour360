<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
  <title>Tour360V4</title>

  <!--
    ==========================================
    USANDO THREE.JS R149 (não r150+) VIA CDN:
    ==========================================
    - three.min.js expõe a variável global `THREE`.
    - OrbitControls.js e VRButton.js importam THR EE como global.
    - Isso evita o erro de “OrbitControls is not a constructor” e “VRButton undefined”.
  -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/webxr/VRButton.js"></script>

  <script>
    // ==============================================
    // CHECAGENS INICIAIS E DEBUG
    // ==============================================
    if (typeof THREE === 'undefined') {
      console.error('❌ Three.js NÃO foi carregado! Verifique o CDN (r149).');
    } else {
      console.log('✅ Three.js version', THREE.REVISION, 'carregado (r149).');
    }

    // Em r149, o OrbitControls aparece como THREE.OrbitControls
    if (typeof THREE.OrbitControls === 'undefined') {
      console.error('❌ OrbitControls NÃO está disponível como global. Verifique o CDN (r149/examples/js/controls/OrbitControls.js).');
    } else {
      console.log('✅ OrbitControls carregado (global THREE.OrbitControls).');
    }

    // Em r149, VRButton aparece como global VRButton
    if (typeof VRButton === 'undefined') {
      console.error('❌ VRButton NÃO está disponível como global. Verifique o CDN (r149/examples/js/webxr/VRButton.js).');
    } else {
      console.log('✅ VRButton carregado (global VRButton).');
    }

    // ==============================================
    // VARIÁVEIS GLOBAIS
    // ==============================================
    let camera, scene, renderer;
    let controls;
    let sphereMono, sphereLeft, sphereRight;
    let texture360;

    // ==============================================
    // INICIALIZAÇÃO QUANDO A PÁGINA CARREGA
    // ==============================================
    window.addEventListener('load', () => {
      console.log('⚙️ onload: inicializando o visualizador 360° VR...');
      init();
      animate();
    });

    function init() {
      console.log('🔧 init() chamado.');

      // 1) CENA E CÂMERA
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 0.01);
      console.log('  • Cena e câmera criadas.');

      // 2) RENDERER COM WebXR HABILITADO
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      // ADICIONA O BOTÃO “Enter VR” se VRButton existir
      if (typeof VRButton !== 'undefined') {
        document.body.appendChild(VRButton.createButton(renderer));
        console.log('  • VRButton adicionado ao DOM.');
      } else {
        console.warn('  • VRButton ausente — sem botão “Enter VR”.');
      }

      console.log('  • Renderer criado. WebXR =', renderer.xr.enabled);

      // 3) CONTROLES (mouse/touch) PARA MODO NÃO-VR
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('  • OrbitControls instanciado (THREE.OrbitControls).');

      // 4) GEOMETRIA DA ESFERA (invertendo normais pra olhar de dentro)
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);
      console.log('  • Geometria da esfera criada e normais invertidas.');

      // 5) CARREGA A TEXTURA 360 (mono/estéreo top-bottom)
      const loader = new THREE.TextureLoader();
      console.log('  • Carregando texto 360 de “media/A2_Stereo.jpg”...');
      texture360 = loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBFormat;
          console.log('    ✅ Textura carregada com sucesso:', tex.image.width, 'x', tex.image.height);
        },
        undefined,
        (err) => {
          console.error('    ❌ Erro ao carregar a textura 360:', err);
        }
      );

      // 6) SHADERS: metade superior (topo) e metade inferior (baixo)
      const fragmentTopo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mostra só metade superior (vUv.y entre 0.5 e 1.0)
          vec2 uv = vec2(vUv.x, vUv.y * 0.5 + 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const fragmentBaixo = `
        varying vec2 vUv;
        uniform sampler2D tex;
        void main() {
          // Mostra só metade inferior (vUv.y entre 0.0 e 0.5)
          vec2 uv = vec2(vUv.x, vUv.y * 0.5);
          gl_FragColor = texture2D(tex, uv);
        }
      `;
      const vertexShader = `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `;
      console.log('  • Shaders criados.');

      // 7) MATERIAIS: Mono (metade superior), Left e Right (topo/baixo)
      const materialMono = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialLeft = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentTopo,
        side: THREE.BackSide
      });
      const materialRight = new THREE.ShaderMaterial({
        uniforms: { tex: { value: texture360 } },
        vertexShader,
        fragmentShader: fragmentBaixo,
        side: THREE.BackSide
      });
      console.log('  • Materiais Mono, Left e Right prontos.');

      // 8) CRIA OS MESHS E DEFINE CAMADAS
      sphereMono = new THREE.Mesh(geometry, materialMono);
      sphereMono.layers.set(0);       // layer 0 = MODO PLANO (metade superior)
      scene.add(sphereMono);

      sphereLeft = new THREE.Mesh(geometry, materialLeft);
      sphereLeft.layers.set(1);       // layer 1 = olho esquerdo VR (metade superior)
      sphereLeft.visible = false;
      scene.add(sphereLeft);

      sphereRight = new THREE.Mesh(geometry, materialRight);
      sphereRight.layers.set(2);      // layer 2 = olho direito VR (metade inferior)
      sphereRight.visible = false;
      scene.add(sphereRight);

      console.log('  • Meshes adicionadas: sphereMono(layer0), sphereLeft(layer1), sphereRight(layer2).');

      // 9) CONFIGURA CÂMERA PARA VER SÓ A LAYER 0 NO INÍCIO
      camera.layers.enable(0);
      console.log('  • Câmera configurada para layer 0 (modo plano).');

      // 10) ADICIONA LISTENER DE RESIZE
      window.addEventListener('resize', onWindowResize);
      console.log('  • Listener para window resize adicionado.');
    }

    // ==============================================
    // FUNÇÃO DE RESIZE
    // ==============================================
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada para', window.innerWidth, 'x', window.innerHeight);
    }

    // ==============================================
    // LOOP DE ANIMAÇÃO
    // ==============================================
    function animate() {
      renderer.setAnimationLoop(render);
    }

    // ==============================================
    // FUNÇÃO DE RENDER (chamada a cada frame)
    // ==============================================
    function render() {
      if (renderer.xr.isPresenting) {
        // Entrou em modo VR: exibe as esferas estéreo
        if (sphereMono.visible) {
          console.log('🕶️ Entrou em modo VR.');
        }
        sphereMono.visible = false;
        sphereLeft.visible = true;
        sphereRight.visible = true;

        const xrCamera = renderer.xr.getCamera(camera);
        if (xrCamera && xrCamera.isArrayCamera) {
          // Desliga todas as layers
          xrCamera.cameras.forEach((c) => {
            c.layers.disable(0);
            c.layers.disable(1);
            c.layers.disable(2);
          });
          // Olho esquerdo → layer 1, olho direito → layer 2
          xrCamera.cameras[0].layers.enable(1);
          xrCamera.cameras[1].layers.enable(2);
        }
      } else {
        // Modo plano: mostra só sphereMono
        if (!sphereMono.visible) {
          console.log('📱 Voltou para modo plano (não-VR).');
        }
        sphereMono.visible = true;
        sphereLeft.visible = false;
        sphereRight.visible = false;
        camera.layers.enable(0);
        camera.layers.disable(1);
        camera.layers.disable(2);
        controls.update();
      }

      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Tela preta, sem margens, canvas full screen */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
    /* O VRButton.js já define estilos do botão; isso só garante posição */
    .webxr-button {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <!--
    O script acima injeta o <canvas> e o botão VR (se houver suporte). 
    Não precisa pôr mais nada aqui.
  -->
</body>
</html>
