<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Tour360 A-Frame V0</title>
  <!-- Carrega A-Frame da CDN -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <!-- Cena A-Frame -->
  <a-scene vr-mode-ui="enabled: true" embedded>
    <!-- Assets: sua imagem estéreo top-bottom em media/A2_Stereo.jpg -->
    <a-assets>
      <img id="stereo360" src="media/A2_Stereo.jpg" crossorigin="anonymous">
    </a-assets>

    <!-- 
      a-sky com stereo="top-bottom" faz o seguinte:
      - no modo “plano” (PC ou celular sem VR), renderiza só a metade superior (olho esquerdo), simulando monoscopia
      - no modo VR, cada olho pega sua metade (topo para olho esquerdo, baixo para olho direito), gerando estereoscopia
    -->
    <a-sky src="#stereo360" stereo="top-bottom" rotation="0 -90 0"></a-sky>

    <!-- 
      Cámara fixa no centro da esfera: controle de mouse/gyroscope já vem no LOOK-CTRL por padrão.
      Você pode girar o mouse/arrastar no celular pra olhar ao redor.
    -->
    <a-entity camera look-controls wasd-controls-enabled="false"></a-entity>
  </a-scene>

</body>
</html>
