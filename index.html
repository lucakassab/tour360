<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>Tour360_3.7</title>
  <!-- A-Frame normal -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- Componente de estéreo → faz o split top-bottom corretamente -->
  <script src="https://unpkg.com/aframe-stereo-component/dist/aframe-stereo-component.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect {
      margin-left: 8px;
    }
    #debugConsole {
      position: absolute;
      bottom: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-family: monospace;
      font-size: 12px;
      padding: 5px;
      max-width: 300px;
      max-height: 150px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>

  <!-- Debug overlay mínimo -->
  <div id="debugConsole">[DEBUG] Iniciando Tour360_3.6...</div>

  <!-- Cena A-Frame -->
  <a-scene id="scene"
           embedded
           vr-mode-ui="enterVRButton: true"
           background="color: #000">
    <!-- Câmera explícita com stereocam para lidar com entidades estéreo -->
    <a-entity id="cam" camera look-controls position="0 0 0.1" stereocam="eye:left"></a-entity>
  </a-scene>

  <script>
    // ——— Variáveis globais ———
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;
    const scene = document.getElementById('scene');
    const debugDiv = document.getElementById('debugConsole');

    let currentMono = null;
    let leftEyeEntity = null;
    let rightEyeEntity = null;
    let currentVideoEl = null;

    function debug(msg) {
      console.log(`[DEBUG] ${msg}`);
      const p = document.createElement('div');
      p.textContent = `[DEBUG] ${msg}`;
      debugDiv.appendChild(p);
      debugDiv.scrollTop = debugDiv.scrollHeight;
    }

    // ——— Funções de manipulação da cena ———

    function clearEntities() {
      if (currentMono) {
        scene.removeChild(currentMono);
        currentMono = null;
        debug('Removed currentMono.');
      }
      if (leftEyeEntity) {
        scene.removeChild(leftEyeEntity);
        leftEyeEntity = null;
        debug('Removed leftEyeEntity.');
      }
      if (rightEyeEntity) {
        scene.removeChild(rightEyeEntity);
        rightEyeEntity = null;
        debug('Removed rightEyeEntity.');
      }
      if (currentVideoEl) {
        document.body.removeChild(currentVideoEl);
        currentVideoEl = null;
        debug('Removed <video> element.');
      }
    }

    /**
     * Exibe UMA entidade (sky ou videosphere) em modo mono.
     * @param {string} url – URL da mídia.
     * @param {boolean} isVideo – true se for vídeo, false se imagem.
     */
    function showMono(url, isVideo) {
      clearEntities();
      if (isVideo) {
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoEl = video;
        debug(`Criado <video> para ${url}`);

        const vs = document.createElement('a-videosphere');
        vs.setAttribute('shader', 'flat');
        vs.setAttribute('src', '#mediaVideo');
        scene.appendChild(vs);
        currentMono = vs;
        debug('Adicionado <a-videosphere> em modo mono.');
      } else {
        const sky = document.createElement('a-sky');
        sky.setAttribute('shader', 'flat');
        sky.setAttribute('src', `url(${url})`);
        scene.appendChild(sky);
        currentMono = sky;
        debug('Adicionado <a-sky> em modo mono.');
      }
    }

    /**
     * Exibe DUAS entidades (sky ou videosphere) em modo estéreo (top-bottom).
     * Cada entidade recebe atributo stereo="eye:left" ou "eye:right".
     * @param {string} url – URL da mídia.
     * @param {boolean} isVideo – true se for vídeo, false se imagem.
     */
    function showStereo(url, isVideo) {
      clearEntities();
      if (isVideo) {
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.autoplay = true;
        video.muted = true;
        video.playsInline = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoEl = video;
        debug(`Criado <video> para estéreo: ${url}`);

        leftEyeEntity = document.createElement('a-videosphere');
        leftEyeEntity.setAttribute('shader', 'flat');
        leftEyeEntity.setAttribute('src', '#mediaVideo');
        leftEyeEntity.setAttribute('stereo', 'eye:left; split:vertical');
        scene.appendChild(leftEyeEntity);
        debug('Adicionado <a-videosphere> para olho esquerdo (estéreo).');

        rightEyeEntity = document.createElement('a-videosphere');
        rightEyeEntity.setAttribute('shader', 'flat');
        rightEyeEntity.setAttribute('src', '#mediaVideo');
        rightEyeEntity.setAttribute('stereo', 'eye:right; split:vertical');
        scene.appendChild(rightEyeEntity);
        debug('Adicionado <a-videosphere> para olho direito (estéreo).');
      } else {
        leftEyeEntity = document.createElement('a-sky');
        leftEyeEntity.setAttribute('shader', 'flat');
        leftEyeEntity.setAttribute('src', `url(${url})`);
        leftEyeEntity.setAttribute('stereo', 'eye:left; split:vertical');
        scene.appendChild(leftEyeEntity);
        debug('Adicionado <a-sky> para olho esquerdo (estéreo).');

        rightEyeEntity = document.createElement('a-sky');
        rightEyeEntity.setAttribute('shader', 'flat');
        rightEyeEntity.setAttribute('src', `url(${url})`);
        rightEyeEntity.setAttribute('stereo', 'eye:right; split:vertical');
        scene.appendChild(rightEyeEntity);
        debug('Adicionado <a-sky> para olho direito (estéreo).');
      }
    }

    /**
     * Carrega a mídia pelo nome, exibe em mono e registra listeners para entrar/sair de VR.
     * @param {string} filename – nome do arquivo em /media.
     */
    function loadMedia(filename) {
      debug(`loadMedia('${filename}') chamado.`);
      clearEntities();
      const url = `${baseUrl}/${filename}`;
      const lower = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(lower);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(lower);
      const isStereo = /_stereo\./i.test(filename);

      // Inicia mostrando mono
      showMono(url, isVideo);

      // Handler para entrada em VR
      const onEnterVR = () => {
        if (isStereo) {
          debug('enter-vr detectado e arquivo é estéreo → showStereo()');
          showStereo(url, isVideo);
          document.getElementById('cam').setAttribute('stereocam', 'eye:left');
        }
      };
      // Handler para saída de VR
      const onExitVR = () => {
        if (isStereo) {
          debug('exit-vr detectado e arquivo é estéreo → showMono()');
          showMono(url, isVideo);
        }
      };

      // Remove listeners antigos para não registrar duplicado
      scene.removeEventListener('enter-vr', scene._enterVrHandler);
      scene.removeEventListener('exit-vr', scene._exitVrHandler);

      // Registra novos
      scene._enterVrHandler = onEnterVR;
      scene._exitVrHandler = onExitVR;
      scene.addEventListener('enter-vr', onEnterVR);
      scene.addEventListener('exit-vr', onExitVR);
    }

    // ——— Funções expostas para testar no console ———

    /**
     * Mostra no console quais entidades estão ativas (mono, leftEye, rightEye, vídeo).
     */
    function listEntities() {
      console.log('currentMono →', currentMono);
      console.log('leftEyeEntity →', leftEyeEntity);
      console.log('rightEyeEntity →', rightEyeEntity);
      console.log('currentVideoEl →', currentVideoEl);
      debug('listEntities() chamado. Confira o console.');
    }

    /**
     * Inspeciona a câmera principal e seu atributo stereocam.
     */
    function inspectCamera() {
      const camEntity = document.getElementById('cam');
      console.log('Camera entity →', camEntity);
      console.log('getAttribute("stereocam") →', camEntity.getAttribute('stereocam'));
      // Tenta mostrar o objeto THREE.Camera dentro do <a-entity>
      console.log('A-Frame THREE.Camera →', camEntity.getObject3D('camera'));
      debug('inspectCamera() chamado. Confira o console.');
    }

    /**
     * Mostra no console todos os <a-sky> ou <a-videosphere> que têm atributo stereo,
     * junto com o valor de stereo="" que cada um carrega.
     */
    function checkStereoAttributes() {
      const elems = document.querySelectorAll('a-sky[stereo], a-videosphere[stereo]');
      if (!elems.length) console.warn('Não há elementos com atributo stereo.');
      elems.forEach(el => console.log(el.tagName, el.getAttribute('stereo')));
      debug('checkStereoAttributes() chamado. Confira o console.');
    }

    /**
     * Mostra no console o estado atual de VR: se a cena está em VR ou não,
     * e quais câmeras-filhas existem no renderer.xr.getCamera().
     */
    function printXrCameras() {
      const isVR = scene.is('vr-mode');
      console.log('Scene.is("vr-mode"): ', isVR);
      // Pega a THREE.WebGLRenderer a partir do a-scene
      const renderer = scene.renderer;
      if (!renderer) {
        console.warn('renderer ainda não está disponível (aguarde a cena completar).');
        return;
      }
      // Pega a câmera XR (um Group que inclui as duas subcâmeras de olho esquerdo + direito)
      const xrCam = renderer.xr.getCamera(scene.camera);
      console.log('XR Camera Group →', xrCam);
      if (xrCam.cameras) {
        xrCam.cameras.forEach((cam, i) => {
          console.log(`  subCamera[${i}] layerMask:`, cam.layers.mask, ' eye:', (i === 0 ? 'left' : 'right'));
        });
      }
      debug('printXrCameras() chamado. Confira o console.');
    }

    /**
     * Força “entrar em VR” no console (útil para testar fora de headset)
     */
    function simulateEnterVR() {
      debug('Tentando chamar scene.enterVR()');
      if (scene.enterVR) scene.enterVR();
      else console.warn('scene.enterVR() não disponível.');
    }

    /**
     * Força “sair de VR” no console (útil se ficar preso em VR)
     */
    function simulateExitVR() {
      debug('Tentando chamar scene.exitVR()');
      if (scene.exitVR) scene.exitVR();
      else console.warn('scene.exitVR() não disponível.');
    }

    /**
     * Limpa toda a cena de entidades (sem recarregar mídia).
     */
    function clearAll() {
      clearEntities();
      debug('clearAll() chamado.');
    }

    // Expõe as funções no objeto global (window) para uso no console:
    window.listEntities = listEntities;
    window.inspectCamera = inspectCamera;
    window.checkStereoAttributes = checkStereoAttributes;
    window.printXrCameras = printXrCameras;
    window.simulateEnterVR = simulateEnterVR;
    window.simulateExitVR = simulateExitVR;
    window.clearAll = clearAll;
    window.showMonoConsole = (fname, isVid) => {
      const url = `${baseUrl}/${fname}`;
      showMono(url, isVid);
      debug(`showMonoConsole('${fname}', ${isVid}) chamado.`);
    };
    window.showStereoConsole = (fname, isVid) => {
      const url = `${baseUrl}/${fname}`;
      showStereo(url, isVid);
      debug(`showStereoConsole('${fname}', ${isVid}) chamado.`);
    };
    window.loadMedia = loadMedia;

    // ——— Inicialização (popula o menu e carrega o primeiro arquivo) ———
    async function init() {
      debug('init() chamado → buscando lista de mídias no GitHub API...');
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) {
        debug(`Erro ao chamar GitHub API: status ${res.status}`);
        return;
      }
      const files = await res.json();
      const mediaList = files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);

      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${mediaList.length} mídia(s)`;
      mediaList.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });

      if (mediaList.length) {
        loadMedia(mediaList[0]);
      }
      select.addEventListener('change', e => loadMedia(e.target.value));
      debug('init() completado → menu populado.');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
