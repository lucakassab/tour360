<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360 – Teste Básico da Esfera 360°</title>

  <!-- Carrega Three.js UMD r147 via JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script>
    if (typeof THREE === 'undefined') {
      console.error('❌ Three.js NÃO foi carregado! Verifique conexão ou CDN.');
    } else {
      console.log('✅ Three.js version', THREE.REVISION, 'carregado (UMD/CDN).');
    }
  </script>
  
  <!-- Carrega OrbitControls UMD r147 via JSDelivr (só para permitir você girar a cena) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    if (typeof THREE.OrbitControls === 'undefined') {
      console.error('❌ OrbitControls NÃO está disponível (verifique CDN).');
    } else {
      console.log('✅ OrbitControls carregado (UMD/CDN).');
    }
  </script>

  <script>
    // ===============================================
    // VARIÁVEIS GLOBAIS PARA O TESTE BÁSICO
    // ===============================================
    let camera, scene, renderer;
    let controls;
    let sphere;

    // Quando a página carregar, roda init() e animate()
    window.addEventListener('load', () => {
      console.log('⚙️ [onload] Iniciando teste básico da esfera 360°...');
      init();
      animate();
    });

    function init() {
      console.log('🔧 [init] iniciado.');

      // ----------------------------
      // 1) CENA E CÂMERA
      // ----------------------------
      scene = new THREE.Scene();
      // Configura câmera: FOV 75°, aspect = tela, near=0.1, far=2000
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
      // Posiciona quase no centro da esfera (raio 500): 
      camera.position.set(0, 0, 0.01); 
      console.log('  • Cena e câmera criadas.');

      // ----------------------------
      // 2) RENDERER
      // ----------------------------
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      // Não precisamos de WebXR aqui, só mostraremos monoscopia
      document.body.appendChild(renderer.domElement);

      console.log('  • Renderer criado.');

      // ----------------------------
      // 3) OrbitControls (para girar o mouse/touch)
      // ----------------------------
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('  • OrbitControls instanciado.');

      // ----------------------------
      // 4) GEOMETRIA DA ESFERA
      //    (raio 500, 60×40 segmentos, normais invertidas)
      // ----------------------------
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1); // inverte para olhar de dentro
      console.log('  • Geometria da esfera criada e normais invertidas.');

      // ----------------------------
      // 5) CARREGA A TEXTURA
      //    mídia em media/A2_Stereo.jpg
      // ----------------------------
      const loader = new THREE.TextureLoader();
      console.log('  • Carregando textura 360 de "./media/A2_Stereo.jpg"...');
      loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBAFormat; // RGBFormat removido em r147
          console.log('    ✅ Textura carregada com sucesso:', tex.image.width + '×' + tex.image.height);

          // ----------------------------
          // 6) CRIA O MATERIAL BÁSICO (MeshBasicMaterial)
          //    que joga a textura inteira no interior da esfera
          // ----------------------------
          const material = new THREE.MeshBasicMaterial({
            map: tex,
            side: THREE.BackSide, // renderiza o interior da esfera
          });
          console.log('    • Material básico criado.');

          // ----------------------------
          // 7) CRIA O MESH e adiciona à cena
          // ----------------------------
          sphere = new THREE.Mesh(geometry, material);
          scene.add(sphere);
          console.log('    • Mesh da esfera adicionada à cena.');
        },
        undefined,
        (err) => {
          console.error('    ❌ Erro ao carregar a textura 360 (404 ou outro):', err);
        }
      );

      // ----------------------------
      // 8) LISTENER PARA REDIMENSIONAMENTO
      // ----------------------------
      window.addEventListener('resize', onWindowResize);
      console.log('  • Listener de resize adicionado.');
    }

    // Ajusta câmera e renderer quando a janela muda de tamanho
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada para', window.innerWidth + '×' + window.innerHeight);
    }

    // Loop de animação
    function animate() {
      requestAnimationFrame(animate);
      controls.update(); // atualiza controles se houver movimento do mouse
      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Tela preta, sem margens, canvas full-screen */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- O script acima injeta o <canvas> e faz todo o resto. -->
</body>
</html>
