<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
<title>Tour360_1.2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- A-Frame CDN -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; background: #000; }
    .menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
    select, button {
      margin-top: 5px;
      width: 100%;
      padding: 4px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="menu">
    <label for="mediaSelect">Escolha uma mídia:</label>
    <select id="mediaSelect">
      <!-- Opções preenchidas pelo script -->
    </select>
    <button onclick="loadMedia()">Carregar</button>
  </div>

  <a-scene vr-mode-ui="enabled: true">
    <a-assets id="assetContainer"></a-assets>
    <!-- <a-sky> projeta corretamente a textura 360 no entorno -->
    <a-sky id="sky" rotation="0 -90 0"></a-sky>
    <a-camera wasd-controls-enabled="false" look-controls="true"></a-camera>
  </a-scene>

  <script>
    // URL base onde as mídias ficam hospedadas
    var BASE_MEDIA_URL = 'https://lucakassab.github.io/tour360/media';

    // Endpoint GitHub API para listar o conteúdo de /media no repositório
    var GITHUB_API_MEDIA =
      'https://api.github.com/repos/lucakassab/tour360/contents/media';

    // Extensões válidas (se quiser vídeo depois, adicione '.mp4')
    var VALID_EXTENSIONS = ['.jpg', '.jpeg', '.png'];

    window.addEventListener('load', function() {
      populateMediaList();
    });

    function populateMediaList() {
      var selectEl = document.getElementById('mediaSelect');

      fetch(GITHUB_API_MEDIA)
        .then(function(res) {
          if (!res.ok) throw new Error('API retornou ' + res.status);
          return res.json();
        })
        .then(function(data) {
          // Filtra só nomes que terminem em _Mono ou _Stereo e com extensão válida
          var validFiles = data
            .map(function(item) { return item.name; })
            .filter(function(name) {
              var lower = name.toLowerCase();
              var hasSuffix =
                lower.indexOf('_mono') !== -1 || lower.indexOf('_stereo') !== -1;
              var hasExt = VALID_EXTENSIONS.some(function(ext) {
                return lower.endsWith(ext);
              });
              return hasSuffix && hasExt;
            });

          if (validFiles.length === 0) {
            var optNone = document.createElement('option');
            optNone.value = '';
            optNone.textContent = 'Nenhuma mídia encontrada';
            selectEl.appendChild(optNone);
            return;
          }

          validFiles.forEach(function(filename) {
            var opt = document.createElement('option');
            opt.value = filename;
            // Remove a extensão pra exibir só o nome “base”
            var label = filename.replace(/(\.jpg|\.jpeg|\.png)$/i, '');
            opt.textContent = label;
            selectEl.appendChild(opt);
          });

          selectEl.selectedIndex = 0;
        })
        .catch(function(err) {
          console.error('Erro ao buscar lista de mídias:', err);
          var optErr = document.createElement('option');
          optErr.value = '';
          optErr.textContent = 'Erro ao carregar mídias';
          selectEl.appendChild(optErr);
        });
    }

    function loadMedia() {
      var selectEl = document.getElementById('mediaSelect');
      var selected = selectEl.value;
      if (!selected) return;

      var isStereo = selected.toLowerCase().indexOf('_stereo') !== -1;
      var skyEl = document.getElementById('sky');
      var assetContainer = document.getElementById('assetContainer');

      // Limpa qualquer asset anterior
      assetContainer.innerHTML = '';
      skyEl.removeAttribute('material');
      skyEl.removeAttribute('stereo');
      skyEl.removeAttribute('offset');

      // Constroi a URL completa para a mídia
      var mediaUrl = BASE_MEDIA_URL + '/' + selected;

      // Cria um <img> dentro de <a-assets> para o A-Frame pré-carregar a textura
      var imgEl = document.createElement('img');
      imgEl.setAttribute('id', 'media360');
      imgEl.setAttribute('src', mediaUrl);
      assetContainer.appendChild(imgEl);

      imgEl.onload = function() {
        // Verifica se estamos em VR (pode não existir renderer.xr se não carregou ainda)
        var scene = document.querySelector('a-scene');
        var isVR = false;
        try {
          isVR = scene.renderer.xr && scene.renderer.xr.isPresenting;
        } catch (e) {
          isVR = false;
        }

        if (isStereo) {
          if (isVR) {
            // -------- VR + Stereo Top-Bottom --------
            // No VR, usamos stereoscopia top-bottom diretamente
            skyEl.setAttribute(
              'material',
              'shader: flat; src: #media360; side: back; npot: true; stereo: top-bottom'
            );
            // NENHUM repeat ou offset em VR: cada olho pega sua metade automaticamente.
          } else {
            // -------- 2D + Stereo (fake mono) --------
            // Em 2D, mostramos apenas a metade de cima (offset 0 0.5 e repeat 1 0.5)
            skyEl.setAttribute(
              'material',
              'shader: flat; src: #media360; side: back; npot: true; repeat: 1 0.5'
            );
            skyEl.setAttribute('offset', '0 0.5');
          }
        } else {
          // -------- Mono (2D ou VR) --------
          // Exibe a imagem inteira: repeat 1 1
          skyEl.setAttribute(
            'material',
            'shader: flat; src: #media360; side: back; npot: true; repeat: 1 1'
          );
          skyEl.removeAttribute('stereo');
        }

        // Se você precisar rodar a imagem (virar “de cabeça para baixo”), ajuste aqui:
        // skyEl.setAttribute('rotation', '0 -90 0');
      };

      imgEl.onerror = function() {
        console.error('Falha ao carregar mídia: ' + mediaUrl);
      };
    }
  </script>
</body>
</html>
