<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360V2.1</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
    }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect {
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>

  <!-- Cena A-Frame -->
  <a-scene id="scene" embedded vr-mode-ui="enterVRButton: true" background="color: #000">
    <!-- As entidades (a-sky, a-videosphere) serão inseridas aqui -->
  </a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;

    let currentEntity = null;
    let currentVideoElement = null;
    const scene = document.getElementById('scene');

    // Pega lista de arquivos na pasta /media via GitHub API
    async function fetchMediaList() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      return files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);
    }

    function clearScene() {
      // Remove a entidade anterior do A-Frame
      if (currentEntity) {
        scene.removeChild(currentEntity);
        currentEntity = null;
      }
      // Remove elemento <video> do DOM se existir
      if (currentVideoElement) {
        document.body.removeChild(currentVideoElement);
        currentVideoElement = null;
      }
    }

    function loadMedia(filename) {
      clearScene();
      const url = `${baseUrl}/${filename}`;
      const lower = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(lower);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(lower);
      const isStereo = /_stereo\./i.test(filename);

      if (isVideo) {
        // Cria <video> offscreen
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.crossOrigin = 'anonymous';
        video.loop = true;
        video.autoplay = true;
        video.muted = true; 
        video.playsInline = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoElement = video;

        // Cria a-videosphere
        const vs = document.createElement('a-videosphere');
        // Material flat para garantir sem iluminação, e src apontando para o <video>
        vs.setAttribute('shader', 'flat');
        vs.setAttribute('src', '#mediaVideo');
        if (isStereo) {
          // Aqui é o pulo do gato: coloca o stereo direto no a-videosphere
          vs.setAttribute('stereo', 'top-bottom');
        }
        scene.appendChild(vs);
        currentEntity = vs;

      } else if (isImage) {
        // Cria a-sky
        const sky = document.createElement('a-sky');
        sky.setAttribute('shader', 'flat');
        // Usa url(...) no src pro A-Frame processar direito
        sky.setAttribute('src', `url(${url})`);
        if (isStereo) {
          // Define split top-bottom direto no <a-sky>
          sky.setAttribute('stereo', 'top-bottom');
        }
        scene.appendChild(sky);
        currentEntity = sky;

      } else {
        console.error('Tipo de mídia não suportado:', filename);
      }
    }

    async function init() {
      const list = await fetchMediaList();
      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${list.length} mídia(s)`;
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      if (list.length) loadMedia(list[0]);
      select.addEventListener('change', e => loadMedia(e.target.value));
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
