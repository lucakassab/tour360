<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tour360X – Visualizador VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="js/logic.js" defer></script>
  <style>
    body { margin: 0; background: #000; }
    .menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      border-radius: 8px;
    }
    select, button {
      margin-top: 5px;
      width: 100%;
      padding: 4px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="menu">
    <label for="mediaSelect">Escolha uma mídia:</label>
    <select id="mediaSelect">
      <option value="praia_Stereo.jpg">Praia (Stereo)</option>
      <option value="banheiro_Mono.jpg">Banheiro (Mono)</option>
    </select>
    <button onclick="loadMedia()">Carregar</button>
  </div>

  <a-scene vr-mode-ui="enabled: true">
    <a-assets id="assetContainer"></a-assets>

    <!-- Skybox para imagem -->
    <a-entity id="sky"></a-entity>

    <a-camera wasd-controls-enabled="false" look-controls="true"></a-camera>
  </a-scene>
</body>
</html>
