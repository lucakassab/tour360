<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Media Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene embedded></a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;

    async function getFirstMedia() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      for (const file of files) {
        if (file.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(file.name)) {
          return file.name;
        }
      }
      return null;
    }

    function applyStereoHalf(entity) {
      entity.setAttribute('material', 'offset', '0 0.5');
      entity.setAttribute('material', 'repeat', '1 0.5');
    }

    function resetStereo(entity) {
      entity.setAttribute('material', 'offset', '0 0');
      entity.setAttribute('material', 'repeat', '1 1');
    }

    async function init() {
      const filename = await getFirstMedia();
      if (!filename) { console.error('Nenhuma mídia encontrada em /media/ no GitHub.'); return; }
      const url = `${baseUrl}/${filename}`;
      const name = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(name);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(name);
      const isStereo = /_stereo\./i.test(name);
      const scene = document.querySelector('a-scene');

      if (isVideo) {
        const video = document.createElement('video');
        video.id = 'mediaVideo'; video.src = url;
        video.loop = true; video.autoplay = true; video.crossOrigin = 'anonymous';
        video.playsInline = true; video.muted = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);

        const vs = document.createElement('a-videosphere');
        vs.setAttribute('src', '#mediaVideo');
        if (isStereo) vs.setAttribute('stereo', 'top-bottom');
        scene.appendChild(vs);

        if (isStereo) {
          applyStereoHalf(vs);
          scene.addEventListener('enter-vr', () => resetStereo(vs));
          scene.addEventListener('exit-vr', () => applyStereoHalf(vs));
        }

      } else if (isImage) {
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', url);
        scene.appendChild(sky);

        if (isStereo) {
          sky.setAttribute('stereo', 'top-bottom');
          applyStereoHalf(sky);
          scene.addEventListener('enter-vr', () => resetStereo(sky));
          scene.addEventListener('exit-vr', () => applyStereoHalf(sky));
        }
      } else {
        console.error('Tipo de mídia não suportado:', url);
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
