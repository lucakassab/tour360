<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Media Viewer</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <a-scene embedded></a-scene>

  <script>
    // CONFIGURADO PARA SEU REPOSITÓRIO GitHub
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';

    // Busca o primeiro arquivo de mídia na pasta /media/ do GitHub via API
    async function getFirstMedia() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      try {
        const res = await fetch(apiUrl);
        if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
        const files = await res.json();
        for (const file of files) {
          if (file.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(file.name)) {
            return file.download_url;
          }
        }
        return null;
      } catch (e) {
        console.error('Erro ao listar mídia no GitHub:', e);
        return null;
      }
    }

    async function init() {
      const mediaUrl = await getFirstMedia();
      if (!mediaUrl) {
        console.error('Nenhuma mídia encontrada em /media/ no GitHub.');
        return;
      }

      const ext = mediaUrl.split('.').pop().split('?')[0].toLowerCase();
      const type = ['mp4', 'webm'].includes(ext) ? 'video' : 'image';
      const params = new URLSearchParams(window.location.search);
      const stereo = params.get('stereo') || 'mono';
      const layout = stereo === 'stereo' ? 'top-bottom' : '';
      const scene = document.querySelector('a-scene');

      if (type === 'video') {
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = mediaUrl;
        video.loop = '';
        video.autoplay = '';
        video.crossOrigin = 'anonymous';
        video.playsInline = '';
        document.body.appendChild(video);

        const videosphere = document.createElement('a-videosphere');
        videosphere.setAttribute('src', '#mediaVideo');
        if (layout) videosphere.setAttribute('stereo', layout);
        scene.appendChild(videosphere);
      } else {
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', mediaUrl);
        if (layout) sky.setAttribute('stereo', layout);
        scene.appendChild(sky);
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
