<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Tour360XXX2</title>

  <!-- 1) Carrega Three.js UMD r147 via JSDelivr -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script>
    if (typeof THREE === 'undefined') {
      console.error('❌ Three.js NÃO foi carregado! Verifique conexão ou CDN.');
    } else {
      console.log('✅ Three.js version', THREE.REVISION, 'carregado (UMD/CDN).');
    }
  </script>

  <!-- 2) Carrega OrbitControls UMD r147 via JSDelivr (para girar a cena) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
  <script>
    if (typeof THREE.OrbitControls === 'undefined') {
      console.error('❌ OrbitControls NÃO está disponível (verifique CDN).');
    } else {
      console.log('✅ OrbitControls carregado (UMD/CDN).');
    }
  </script>

  <script>
    // ===============================================
    // VARIÁVEIS GLOBAIS PARA O TESTE BÁSICO
    // ===============================================
    let camera, scene, renderer;
    let controls;
    let sphere;

    // Quando a página carregar, roda init() e animate()
    window.addEventListener('load', () => {
      console.log('⚙️ [onload] Iniciando teste básico da esfera 360°...');
      init();
      animate();
    });

    function init() {
      console.log('🔧 [init] iniciado.');

      // ----------------------------------------------------
      // 1) CENA E CÂMERA
      // ----------------------------------------------------
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
      // Posiciona quase no centro da esfera (raio 500)
      camera.position.set(0, 0, 0.01);
      console.log('  • Cena e câmera criadas.');

      // ----------------------------------------------------
      // 2) RENDERER
      // ----------------------------------------------------
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      console.log('  • Renderer criado.');

      // ----------------------------------------------------
      // 3) OrbitControls (para girar com mouse/touch)
      // ----------------------------------------------------
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.rotateSpeed = 0.5;
      console.log('  • OrbitControls instanciado.');

      // ----------------------------------------------------
      // 4) GEOMETRIA DA ESFERA (raio=500, segmentos 60x40)
      //    Inverte as normais para olhar de dentro
      // ----------------------------------------------------
      const geometry = new THREE.SphereGeometry(500, 60, 40);
      geometry.scale(-1, 1, 1);
      console.log('  • Geometria da esfera criada e normais invertidas.');

      // ----------------------------------------------------
      // 5) CARREGA A TEXTURA 360° (mídia em media/A2_Stereo.jpg)
      // ----------------------------------------------------
      const loader = new THREE.TextureLoader();
      console.log('  • Carregando textura 360 de "./media/A2_Stereo.jpg"...');
      loader.load(
        'media/A2_Stereo.jpg',
        (tex) => {
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.format = THREE.RGBAFormat; // Este format funciona em r147+
          console.log('    ✅ Textura carregada com sucesso:', tex.image.width + '×' + tex.image.height);

          // ----------------------------------------------------
          // 6) CRIA O MATERIAL BÁSICO (MeshBasicMaterial),
          //    que renderiza o lado padrão (FrontSide). 
          //    Como já invertemos as normais, ele vai desenhar o interior da esfera.
          // ----------------------------------------------------
          const material = new THREE.MeshBasicMaterial({
            map: tex,
            side: THREE.FrontSide, // Aqui é o padrão; serve porque a geometria já foi invertida
          });
          console.log('    • Material básico criado (FrontSide, já que a geometria está invertida).');

          // ----------------------------------------------------
          // 7) CRIA O MESH com essa geometria + material
          // ----------------------------------------------------
          sphere = new THREE.Mesh(geometry, material);
          scene.add(sphere);
          console.log('    • Mesh da esfera adicionada à cena.');
        },
        undefined,
        (err) => {
          console.error('    ❌ Erro ao carregar a textura 360 (404 ou outro):', err);
        }
      );

      // ----------------------------------------------------
      // 8) LISTENER PARA REDIMENSIONAMENTO
      // ----------------------------------------------------
      window.addEventListener('resize', onWindowResize);
      console.log('  • Listener de resize adicionado.');
    }

    // Ajusta câmera e renderer quando a janela muda de tamanho
    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      console.log('📐 Janela redimensionada para', window.innerWidth + '×' + window.innerHeight);
    }

    // Loop de animação
    function animate() {
      requestAnimationFrame(animate);
      controls.update(); // atualiza controles do mouse/touch
      renderer.render(scene, camera);
    }
  </script>

  <style>
    /* Tela preta, sem margens, canvas full-screen */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 
    O JavaScript acima já injeta o <canvas> e renderiza tudo.
    Não precisa colocar nada dentro do <body>.
  -->
</body>
</html>
