<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360 Media Viewer V2</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
    #menu {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      border-radius: 4px;
      font-family: sans-serif;
    }
    #mediaSelect { margin-left: 8px; }
  </style>
</head>
<body>
  <div id="menu">
    <span id="count">0 mídia(s)</span>
    <select id="mediaSelect"></select>
  </div>
  <a-scene embedded id="scene"></a-scene>

  <script>
    const owner = 'lucakassab';
    const repo = 'tour360';
    const branch = 'main';
    const baseUrl = `https://${owner}.github.io/${repo}/media`;
    let currentEntity = null;
    let currentVideoElement = null;

    async function fetchMediaList() {
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/media?ref=${branch}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error(`GitHub API respondeu status ${res.status}`);
      const files = await res.json();
      return files
        .filter(f => f.type === 'file' && /\.(jpg|jpeg|png|gif|mp4|webm)$/i.test(f.name))
        .map(f => f.name);
    }

    function clearScene() {
      const scene = document.getElementById('scene');
      if (currentEntity) {
        scene.removeChild(currentEntity);
        currentEntity = null;
      }
      if (currentVideoElement) {
        document.body.removeChild(currentVideoElement);
        currentVideoElement = null;
      }
    }

    function applyStereoHalf(entity) {
      // Sem VR: desabilita material.stereo e mostra só a metade superior
      entity.setAttribute('material', 'stereo: none; offset: 0 0.5; repeat: 1 0.5');
    }

    function resetStereo(entity) {
      // No VR: habilita material.stereo top-bottom e reseta offset/repeat pra 1x1
      entity.setAttribute('material', 'stereo: top-bottom; offset: 0 0; repeat: 1 1');
    }

    function forceMaterialUpdate(entity) {
      // Força atualização do material/textura no Three.js
      const mesh = entity.getObject3D('mesh');
      if (mesh && mesh.material) {
        if (mesh.material.map) mesh.material.map.needsUpdate = true;
        mesh.material.needsUpdate = true;
      }
    }

    function loadMedia(filename) {
      clearScene();
      const url = `${baseUrl}/${filename}`;
      const name = filename.toLowerCase();
      const isVideo = /\.(mp4|webm)$/i.test(name);
      const isImage = /\.(jpg|jpeg|png|gif)$/i.test(name);
      const isStereo = /_stereo\./i.test(name);
      const scene = document.getElementById('scene');

      if (isVideo) {
        // Cria <video> para a-videosphere
        const video = document.createElement('video');
        video.id = 'mediaVideo';
        video.src = url;
        video.loop = true;
        video.autoplay = true;
        video.crossOrigin = 'anonymous';
        video.playsInline = true;
        video.muted = true;
        video.setAttribute('webkit-playsinline', '');
        document.body.appendChild(video);
        currentVideoElement = video;

        // Cria videosphere
        const vs = document.createElement('a-videosphere');
        vs.setAttribute('src', '#mediaVideo');
        if (isStereo) {
          // Já define material.stereo pra top-bottom (mas vamos logo aplicar a metade pra 2D)
          vs.setAttribute('material', 'stereo: top-bottom; offset: 0 0.5; repeat: 1 0.5');
        }
        scene.appendChild(vs);
        currentEntity = vs;

      } else if (isImage) {
        // Cria a-sky
        const sky = document.createElement('a-sky');
        sky.setAttribute('src', url);
        if (isStereo) {
          // Define material.stereo e aplica metade superior direto
          sky.setAttribute('material', 'stereo: top-bottom; offset: 0 0.5; repeat: 1 0.5');
        }
        scene.appendChild(sky);
        currentEntity = sky;

      } else {
        console.error('Tipo de mídia não suportado:', url);
      }
    }

    async function init() {
      const list = await fetchMediaList();
      const countEl = document.getElementById('count');
      const select = document.getElementById('mediaSelect');
      countEl.textContent = `${list.length} mídia(s)`;
      list.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });
      select.addEventListener('change', e => loadMedia(e.target.value));
      if (list.length) loadMedia(list[0]);

      // Eventos de VR
      const sceneEl = document.getElementById('scene');
      sceneEl.addEventListener('enter-vr', () => {
        if (currentEntity && currentEntity.hasAttribute('material')) {
          // Dá um tempinho pro A-Frame entrar no VR antes de resetar
          setTimeout(() => {
            resetStereo(currentEntity);
            forceMaterialUpdate(currentEntity);
          }, 50);
        }
      });
      sceneEl.addEventListener('exit-vr', () => {
        if (currentEntity && currentEntity.hasAttribute('material')) {
          setTimeout(() => {
            // Se for estereoscópico, volta a metade superior; se não, nada a fazer
            const filename = document.getElementById('mediaSelect').value.toLowerCase();
            if (/_stereo\./i.test(filename)) {
              applyStereoHalf(currentEntity);
              forceMaterialUpdate(currentEntity);
            }
          }, 50);
        }
      });
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
